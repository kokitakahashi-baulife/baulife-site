<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売上ランク表 — BAULIFE 社内ポータル</title>
<style>
  :root{
    --ink:#3a332b; --gray:#8a7f70; --cream:#f7f3ec; --paper:#fffdf9;
    --pink:#e85d75; --line:#e3dccf;
    --pbg:#0e1016; --pcard:#161922; --pcell:#1b1f29; --pline:#2a2f3a;
    --gold:#c9a24b; --ptext:#eef1f6; --pmuted:#8a93a3;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:var(--cream);}
  .toolbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;
    padding:11px 16px;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .toolbar a.back{font-size:13px;color:var(--gray);text-decoration:none;}
  .toolbar a.back:hover{color:var(--pink);}
  .toolbar h1{font-size:15px;margin:0;color:var(--pink);font-weight:700;}
  .toolbar .spacer{flex:1;}
  .wrap{max-width:840px;margin:0 auto;padding:20px 16px 60px;}
  .lead{font-size:13px;color:var(--gray);line-height:1.7;margin:0 0 18px;}

  /* 現在地判定ツール */
  .finder{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:0 0 22px;}
  .finder h2{font-size:13px;font-weight:700;color:var(--pink);margin:0 0 10px;}
  .frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{border:0;background:transparent;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--gray);}
  .seg button.active{background:var(--pink);color:#fff;}
  .finder input[type=number]{width:120px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;}
  .finder select{border:1px solid var(--line);border-radius:8px;padding:8px 8px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);}
  .btn{border:1px solid var(--pink);background:var(--pink);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:700;}
  .btn:hover{opacity:.9;}
  .result{margin-top:12px;font-size:14px;line-height:1.7;color:var(--ink);display:none;}
  .result.show{display:block;}
  .result .badge{display:inline-block;color:#fff;border-radius:6px;padding:2px 10px;font-weight:700;font-size:13px;margin-right:6px;}
  .result .sub{color:var(--gray);font-size:13px;}

  /* ポスター */
  .poster{background:var(--pbg);border:1px solid var(--gold);border-radius:14px;padding:18px 14px 14px;color:var(--ptext);}
  .phead{text-align:center;border-bottom:1px solid var(--pline);padding-bottom:11px;margin-bottom:12px;}
  .phead .en{font-size:11px;letter-spacing:4px;color:var(--gold);font-weight:700;}
  .phead .ja{font-size:21px;font-weight:700;margin-top:4px;}
  .phead .note{font-size:10px;color:var(--pmuted);margin-top:4px;}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .grid{display:grid;grid-template-columns:30px repeat(8,minmax(76px,1fr));gap:4px;min-width:660px;}
  .hcell{display:flex;flex-direction:column;align-items:center;gap:2px;padding-bottom:3px;}
  .hcell span{font-size:9px;font-weight:700;text-align:center;line-height:1.05;}
  .tlabel{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);}
  .cell{background:var(--pcell);border:0.5px solid var(--pline);border-radius:5px;padding:6px 3px;text-align:center;
    display:flex;flex-direction:column;justify-content:center;min-height:46px;transition:transform .12s;}
  .cell .mo{font-size:10px;font-weight:700;color:var(--ptext);line-height:1.2;}
  .cell .yr{font-size:9px;color:var(--pmuted);margin-top:2px;line-height:1.15;}
  .cell.hit{outline:2px solid #ffd866;background:#2c2620;transform:scale(1.04);position:relative;z-index:2;}
  .pfoot{text-align:center;font-size:10px;color:#6b7280;margin-top:12px;border-top:1px solid var(--pline);padding-top:9px;}
  .corner{font-size:9px;color:#6b7280;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;}
</style>
</head>
<body>
<div class="toolbar">
  <a class="back" href="/tools">← 社内ポータル</a>
  <h1>売上ランク表</h1>
  <span class="spacer"></span>
</div>

<div class="wrap">
  <p class="lead">
    会社の売上規模を8段階のランクに見立てた一覧です。<strong>1ランク＝桁が1つ上がる</strong>／各ランクは Ⅳ→Ⅰ の4ティア。
    月商を主軸に年商を併記しています。下の入力に自社の売上を入れると、現在地のランクと「次の昇格まであといくら」が出ます。
  </p>

  <div class="finder">
    <h2>あなたの現在地を判定</h2>
    <div class="frow">
      <div class="seg" id="modeSeg">
        <button data-mode="month" class="active">月商で入力</button>
        <button data-mode="year">年商で入力</button>
      </div>
      <input type="number" id="amount" placeholder="数値" min="0" step="any">
      <select id="unit">
        <option value="10000">万円</option>
        <option value="100000000">億円</option>
        <option value="1000000000000">兆円</option>
      </select>
      <button class="btn" id="judge">判定する</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <div class="poster">
    <div class="phead">
      <div class="en">REVENUE RANKED</div>
      <div class="ja">売上ランク表</div>
      <div class="note">列＝ランク（右ほど上位）／ 行＝tier（上Ⅰ〜下Ⅳ）／ 上段＝月商・下段＝年商</div>
    </div>
    <div class="scroll">
      <div class="grid" id="grid"></div>
    </div>
    <div class="pfoot">世界トップ100の入口 ≈ ¥12〜15兆（Master上位〜Apex Predator） ／ 世界最大級 ≈ ¥100兆（ウォルマート級）</div>
  </div>
</div>

<script>
// index 0=Rookie ... 7=Apex Predator（左→右）。tiers は Ⅰ→Ⅳ（上→下）。lo/hi は年商の下限/上限（円）。
const RANKS=[
 {n:"Rookie",sn:"Rookie",g:"RK",f:"#6f7d63",s:"#9aac8c",t:"#fff",tiers:[
   {l:"Ⅰ",mo:"63〜83万",yr:"750〜1,000万",lo:7.5e6,hi:1e7},
   {l:"Ⅱ",mo:"42〜63万",yr:"500〜750万",lo:5e6,hi:7.5e6},
   {l:"Ⅲ",mo:"21〜42万",yr:"250〜500万",lo:2.5e6,hi:5e6},
   {l:"Ⅳ",mo:"〜21万",yr:"〜250万",lo:0,hi:2.5e6}]},
 {n:"Bronze",sn:"Bronze",g:"BR",f:"#b06a3c",s:"#d2956a",t:"#fff",tiers:[
   {l:"Ⅰ",mo:"500〜833万",yr:"6,000万〜1億",lo:6e7,hi:1e8},
   {l:"Ⅱ",mo:"292〜500万",yr:"3,500〜6,000万",lo:3.5e7,hi:6e7},
   {l:"Ⅲ",mo:"167〜292万",yr:"2,000〜3,500万",lo:2e7,hi:3.5e7},
   {l:"Ⅳ",mo:"83〜167万",yr:"1,000〜2,000万",lo:1e7,hi:2e7}]},
 {n:"Silver",sn:"Silver",g:"SV",f:"#9aa4ad",s:"#c8cfd5",t:"#1c2024",tiers:[
   {l:"Ⅰ",mo:"5,000〜8,333万",yr:"6〜10億",lo:6e8,hi:1e9},
   {l:"Ⅱ",mo:"2,917〜5,000万",yr:"3.5〜6億",lo:3.5e8,hi:6e8},
   {l:"Ⅲ",mo:"1,667〜2,917万",yr:"2〜3.5億",lo:2e8,hi:3.5e8},
   {l:"Ⅳ",mo:"833〜1,667万",yr:"1〜2億",lo:1e8,hi:2e8}]},
 {n:"Gold",sn:"Gold",g:"GD",f:"#e0aa37",s:"#f2cd70",t:"#4a3508",tiers:[
   {l:"Ⅰ",mo:"5〜8.3億",yr:"60〜100億",lo:6e9,hi:1e10},
   {l:"Ⅱ",mo:"2.9〜5億",yr:"35〜60億",lo:3.5e9,hi:6e9},
   {l:"Ⅲ",mo:"1.7〜2.9億",yr:"20〜35億",lo:2e9,hi:3.5e9},
   {l:"Ⅳ",mo:"0.83〜1.7億",yr:"10〜20億",lo:1e9,hi:2e9}]},
 {n:"Platinum",sn:"Platinum",g:"PT",f:"#43b8b8",s:"#7fd6d2",t:"#08312f",tiers:[
   {l:"Ⅰ",mo:"50〜83億",yr:"600〜1,000億",lo:6e10,hi:1e11},
   {l:"Ⅱ",mo:"29〜50億",yr:"350〜600億",lo:3.5e10,hi:6e10},
   {l:"Ⅲ",mo:"17〜29億",yr:"200〜350億",lo:2e10,hi:3.5e10},
   {l:"Ⅳ",mo:"8.3〜17億",yr:"100〜200億",lo:1e10,hi:2e10}]},
 {n:"Diamond",sn:"Diamond",g:"DI",f:"#5b9be0",s:"#9ec8f2",t:"#fff",tiers:[
   {l:"Ⅰ",mo:"500〜833億",yr:"6,000億〜1兆",lo:6e11,hi:1e12},
   {l:"Ⅱ",mo:"292〜500億",yr:"3,500〜6,000億",lo:3.5e11,hi:6e11},
   {l:"Ⅲ",mo:"167〜292億",yr:"2,000〜3,500億",lo:2e11,hi:3.5e11},
   {l:"Ⅳ",mo:"83〜167億",yr:"1,000〜2,000億",lo:1e11,hi:2e11}]},
 {n:"Master",sn:"Master",g:"MA",f:"#9b4fd0",s:"#c08ae6",t:"#fff",tiers:[
   {l:"Ⅰ",mo:"5,000〜8,333億",yr:"6〜10兆",lo:6e12,hi:1e13},
   {l:"Ⅱ",mo:"2,917〜5,000億",yr:"3.5〜6兆",lo:3.5e12,hi:6e12},
   {l:"Ⅲ",mo:"1,667〜2,917億",yr:"2〜3.5兆",lo:2e12,hi:3.5e12},
   {l:"Ⅳ",mo:"833〜1,667億",yr:"1〜2兆",lo:1e12,hi:2e12}]},
 {n:"Apex Predator",sn:"Predator",g:"AP",f:"#d33b3b",s:"#f06a6a",t:"#fff",tiers:[
   {l:"Ⅰ",mo:"5兆〜",yr:"60兆〜",lo:6e13,hi:Infinity},
   {l:"Ⅱ",mo:"2.9〜5兆",yr:"35〜60兆",lo:3.5e13,hi:6e13},
   {l:"Ⅲ",mo:"1.7〜2.9兆",yr:"20〜35兆",lo:2e13,hi:3.5e13},
   {l:"Ⅳ",mo:"0.83〜1.7兆",yr:"10〜20兆",lo:1e13,hi:2e13}]},
];

function gem(d,size){return '<svg viewBox="0 0 100 116" width="'+size+'" height="'+Math.round(size*1.16)+'" aria-hidden="true"><polygon points="50,3 97,58 50,113 3,58" fill="'+d.f+'" stroke="'+d.s+'" stroke-width="4"/><polygon points="50,23 77,58 50,93 23,58" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2"/><text x="50" y="60" text-anchor="middle" dominant-baseline="central" font-size="25" font-weight="700" fill="'+d.t+'">'+d.g+'</text></svg>';}

// グリッド生成
const G=document.getElementById("grid");
let html='<div class="corner">tier</div>';
RANKS.forEach(d=>{ html+='<div class="hcell">'+gem(d,30)+'<span style="color:'+d.s+'">'+d.sn+'</span></div>'; });
for(let ti=0;ti<4;ti++){
  html+='<div class="tlabel">'+RANKS[0].tiers[ti].l+'</div>';
  RANKS.forEach((d,ri)=>{
    const v=d.tiers[ti];
    html+='<div class="cell" id="c'+ri+'-'+ti+'"><div class="mo">'+v.mo+'</div><div class="yr">年 '+v.yr+'</div></div>';
  });
}
G.innerHTML=html;

// 金額フォーマット（円→万/億/兆）
function fmt(n){
  if(!isFinite(n)) return "—";
  const trim=x=>{const s=(Math.round(x*10)/10).toString();return s;};
  if(n>=1e12) return trim(n/1e12)+"兆円";
  if(n>=1e8)  return trim(n/1e8)+"億円";
  if(n>=1e4)  return trim(n/1e4)+"万円";
  return Math.round(n).toLocaleString()+"円";
}

// フラットな昇順リスト（Rookie Ⅳ → … → Predator Ⅰ）。昇格先の算出用。
const FLAT=[];
RANKS.forEach((d,ri)=>{ for(let ti=3;ti>=0;ti--){ FLAT.push({ri,ti,d,v:d.tiers[ti]}); } });

let mode="month";
const modeSeg=document.getElementById("modeSeg");
modeSeg.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  mode=b.dataset.mode;
  [...modeSeg.children].forEach(x=>x.classList.toggle("active",x===b));
});

function judge(){
  const raw=parseFloat(document.getElementById("amount").value);
  const unit=parseFloat(document.getElementById("unit").value);
  const res=document.getElementById("result");
  document.querySelectorAll(".cell.hit").forEach(c=>c.classList.remove("hit"));
  if(!(raw>0)){ res.className="result show"; res.innerHTML='<span class="sub">数値を入力してください。</span>'; return; }
  const entered=raw*unit;                       // 入力された月 or 年の金額（円）
  const annual=mode==="month"? entered*12 : entered;
  // 該当ティアを検索
  let idx=FLAT.findIndex(f=>annual>=f.v.lo && annual<f.v.hi);
  if(idx<0) idx=FLAT.length-1;                   // 上限超は最高ランク
  const cur=FLAT[idx];
  const cell=document.getElementById("c"+cur.ri+"-"+cur.ti);
  cell.classList.add("hit");
  cell.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  // 次の昇格先
  const next=FLAT[idx+1];
  let nextLine;
  if(!next){ nextLine='<span class="sub">最高ランク到達 🏆</span>'; }
  else{
    const gapAnnual=next.v.lo-annual;
    const gapMonthly=gapAnnual/12;
    nextLine='<span class="sub">次の <strong>'+next.d.n+' '+next.v.l+'</strong> まであと　月商 +'+fmt(gapMonthly)+' ／ 年商 +'+fmt(gapAnnual)+'</span>';
  }
  res.className="result show";
  res.innerHTML='<span class="badge" style="background:'+cur.d.f+'">'+cur.d.n+' '+cur.v.l+'</span>'+
    '月商 '+cur.v.mo+' ／ 年商 '+cur.v.yr+'<br>'+
    '<span class="sub">入力: '+(mode==="month"?"月商 "+fmt(entered)+"（年商換算 "+fmt(annual)+"）":"年商 "+fmt(annual))+'</span><br>'+nextLine;
}
document.getElementById("judge").addEventListener("click",judge);
document.getElementById("amount").addEventListener("keydown",e=>{ if(e.key==="Enter")judge(); });
</script>
</body>
</html>
