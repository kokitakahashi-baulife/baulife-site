<script type="importmap">
{"imports":{
 "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
 "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import RAPIER from '@dimforge/rapier3d-compat';
await RAPIER.init();

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.NoToneMapping;
renderer.toneMappingExposure=0.9;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
// 背景：実物写真と比較できるよう純白で統一
scene.background=new THREE.Color('#ffffff');

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.1,100);
camera.position.set(0,16.5,9.8);

const controls=new OrbitControls(camera,canvas);
controls.target.set(0,0,0);
controls.enableDamping=true;
controls.maxPolarAngle=Math.PI*0.49;

// lights
const key=new THREE.DirectionalLight(0xffffff,1.05);
key.position.set(6,10,5);
key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=1;key.shadow.camera.far=40;
key.shadow.camera.left=-10;key.shadow.camera.right=10;key.shadow.camera.top=10;key.shadow.camera.bottom=-10;
key.shadow.bias=-0.0003;
key.shadow.radius=3.5;
scene.add(key);
const fill=new THREE.DirectionalLight(0xffffff,0.04); fill.position.set(-6,4,-3); scene.add(fill);
// リムライト（粒の輪郭・白×白の分離を出す）
const rim=new THREE.DirectionalLight(0xffffff,0.06); rim.position.set(-4,6,-7); scene.add(rim);
scene.add(new THREE.HemisphereLight(0xffffff,0xb6b6b6,0.25));
scene.add(new THREE.AmbientLight(0xffffff,0.92));

// ground (catch soft shadow only, keep bg color)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.ShadowMaterial({opacity:0.3}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

// お皿（ワックスを流し出すシーン）
const PLATE_R=4.4;
const dishMat=new THREE.MeshPhysicalMaterial({color:'#e3ddd0',roughness:0.5,clearcoat:0.4,clearcoatRoughness:0.4,envMapIntensity:0.7});
const plate=new THREE.Group();
const dishBase=new THREE.Mesh(new THREE.CylinderGeometry(PLATE_R,PLATE_R*0.82,0.34,72), dishMat);
dishBase.position.y=-0.17; dishBase.receiveShadow=true; plate.add(dishBase);
const dishRim=new THREE.Mesh(new THREE.TorusGeometry(PLATE_R,0.17,18,72), dishMat);
dishRim.rotation.x=Math.PI/2; dishRim.position.y=0.04; dishRim.receiveShadow=true; plate.add(dishRim);
scene.add(plate);

// ---- 形のジオメトリ（八角・星 共通の立体化）----
function solidify(shape,H,BEV,dome,Rtop){
  const geo=new THREE.ExtrudeGeometry(shape,{
    depth:H, bevelEnabled:true, bevelThickness:BEV, bevelSize:BEV, bevelSegments:9, curveSegments:8
  });
  geo.rotateX(-Math.PI/2); geo.center();
  // 天面・底面をドーム状にふくらませる（ぷっくり感）
  const pos=geo.attributes.position;
  let maxY=-1e9,minY=1e9;
  for(let i=0;i<pos.count;i++){const y=pos.getY(i);maxY=Math.max(maxY,y);minY=Math.min(minY,y);}
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const r2=Math.min(1,(x*x+z*z)/(Rtop*Rtop));
    if(y>maxY-1e-3) pos.setY(i, y+dome*(1-r2));
    else if(y<minY+1e-3) pos.setY(i, y-dome*0.5*(1-r2));
  }
  pos.needsUpdate=true; geo.computeVertexNormals();
  geo.computeBoundingBox(); geo.userData.rest=-geo.boundingBox.min.y;
  return geo;
}
function octaShape(R){const s=new THREE.Shape();for(let i=0;i<8;i++){const a=Math.PI/8+i*Math.PI/4;const x=Math.cos(a)*R,y=Math.sin(a)*R;i===0?s.moveTo(x,y):s.lineTo(x,y);}s.closePath();return s;}
// 角を丸めた星（ぷっくり星用）
function roundedStarShape(Ro,Ri,pts,round){
  const n=pts*2, V=[];
  for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI/pts;const r=(i%2===0)?Ro:Ri;V.push([Math.cos(a)*r,Math.sin(a)*r]);}
  const s=new THREE.Shape();
  for(let i=0;i<n;i++){
    const p=V[(i-1+n)%n], c=V[i], q=V[(i+1)%n];
    const d1=[p[0]-c[0],p[1]-c[1]], d2=[q[0]-c[0],q[1]-c[1]];
    const l1=Math.hypot(d1[0],d1[1])||1, l2=Math.hypot(d2[0],d2[1])||1;
    const rr=Math.min(round, l1*0.45, l2*0.45);
    const a1=[c[0]+d1[0]/l1*rr, c[1]+d1[1]/l1*rr];
    const a2=[c[0]+d2[0]/l2*rr, c[1]+d2[1]/l2*rr];
    i===0?s.moveTo(a1[0],a1[1]):s.lineTo(a1[0],a1[1]);
    s.quadraticCurveTo(c[0],c[1],a2[0],a2[1]);
  }
  s.closePath(); return s;
}

// アウトラインを中心がぷっくり膨らむクッション状に立体化（風船インフレート）
function puffGeo(outline, peakTop, peakBot, J, I){
  const B=outline.map(p=>({a:Math.atan2(p.y,p.x), r:Math.hypot(p.x,p.y)})).sort((u,v)=>u.a-v.a);
  function bR(a){
    a=((a+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
    if(a<=B[0].a||a>=B[B.length-1].a){ const c=B[B.length-1], n=B[0], span=(n.a+2*Math.PI)-c.a;
      const f=((a<B[0].a?a+2*Math.PI:a)-c.a)/span; return c.r+(n.r-c.r)*f; }
    for(let i=0;i<B.length-1;i++){ if(a>=B[i].a&&a<=B[i+1].a){ const f=(a-B[i].a)/((B[i+1].a-B[i].a)||1); return B[i].r+(B[i+1].r-B[i].r)*f; } }
    return B[0].r;
  }
  const pos=[], idx=[];
  function surf(sign,peak){
    const base=pos.length/3;
    pos.push(0,sign*peak,0);
    for(let j=1;j<=J;j++){
      const t=j/J, prof=Math.sqrt(Math.max(0,1-t*t)), y=sign*peak*prof;
      for(let i=0;i<I;i++){ const a=i/I*Math.PI*2, R=bR(a)*t; pos.push(Math.cos(a)*R, y, Math.sin(a)*R); }
    }
    const c0=base;
    for(let i=0;i<I;i++){ const b=base+1+i, c=base+1+(i+1)%I; sign>0?idx.push(c0,c,b):idx.push(c0,b,c); }
    for(let j=1;j<J;j++){ const r0=base+1+(j-1)*I, r1=base+1+j*I;
      for(let i=0;i<I;i++){ const i2=(i+1)%I, A=r0+i,Bb=r0+i2,C=r1+i,D=r1+i2;
        sign>0?idx.push(A,Bb,C,Bb,D,C):idx.push(A,C,Bb,Bb,C,D); } }
  }
  surf(1,peakTop); surf(-1,peakBot);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y;
  return g;
}

function ellipseShape(rx,ry,cx,cy){ const s=new THREE.Shape(); const N=56;
  for(let i=0;i<=N;i++){const a=i/N*Math.PI*2,x=(cx||0)+Math.cos(a)*rx,y=(cy||0)+Math.sin(a)*ry; i===0?s.moveTo(x,y):s.lineTo(x,y);} return s; }

function domeFinish(geo,dome){

    const r2=Math.min(1,((x-cx)**2+(z-cz)**2)/((span*span)||1));
    if(y>maxY-1e-3) pos.setY(i,y+dome*(1-r2)); else if(y<minY+1e-3) pos.setY(i,y-dome*0.5*(1-r2)); }

}

// 扇（要から放射するセクター面＋骨リブの溝）
function fanGeo(opts){
  const o=Object.assign({L:1.9,span:1.55,ribs:7,bodyTop:0.32,ribDepth:0.07,peakBot:0.22,notch:0.2,Nv:36,Nu:140},opts||{});

    return [apex[0]+Math.cos(ang)*r, -(apex[1]+Math.sin(ang)*r)]; }

    const band=Math.max(0,Math.min(1,(v-0.12)/0.18));

    for(let j=0;j<=o.Nv;j++){ const v=j/o.Nv;

        const y=sign>0?topY(u,v):-o.peakBot*eu(u)*ev(v);
        pos.push(p[0],y,p[1]); } }
    for(let j=0;j<o.Nv;j++){ for(let i=0;i<o.Nu;i++){
      const A=base+j*W+i,B=base+j*W+i+1,C=base+(j+1)*W+i,D=base+(j+1)*W+i+1;

}

function roundedTriangleShape(R,rr){

const sparkleRough=(function(){ const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#fff'; x.fillRect(0,0,256,256);
  for(let i=0;i<900;i++){ const px=Math.random()*256,py=Math.random()*256,r=Math.random()*1.6+0.4;
    x.fillStyle='rgba(0,0,0,0.95)'; x.beginPath(); x.arc(px,py,r,0,7); x.fill(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,3); return t; })();
function makeMarble(cols,size){ size=size||512; const c=document.createElement('canvas'); c.width=c.height=size; const x=c.getContext('2d');
  const hx=h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
  x.fillStyle=cols[0]; x.fillRect(0,0,size,size);
  for(let i=0;i<220;i++){ const rgb=hx(cols[1+Math.floor(Math.random()*(cols.length-1))]);
    const px=Math.random()*size, py=Math.random()*size, rr=size*(0.06+Math.random()*0.26), a=0.55+Math.random()*0.4;
    x.save(); x.translate(px,py); x.rotate(Math.random()*Math.PI); x.scale(1,0.3+Math.random()*0.5);
    const g=x.createRadialGradient(0,0,0,0,0,rr);
    g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`); g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
    x.fillStyle=g; x.beginPath(); x.arc(0,0,rr,0,7); x.fill(); x.restore(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
// 同系色の濃淡を作る（マットと遠目では同色、近くで混色＝ラメ）
function shade(hex,f){ const h=hex.replace('#',''); const v=i=>Math.max(0,Math.min(255,Math.round(parseInt(h.slice(i,i+2),16)*f)));
  return '#'+[v(0),v(2),v(4)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
// HSLで明度(L)を一定up＝同じ色相のまま白に近づける（純白にはしない）
function lighten(hex,dL){ const h=hex.replace('#','');
  let r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; let l=(mx+mn)/2,s=0,H=0;
  if(d>0){ s=d/(1-Math.abs(2*l-1)); if(mx===r)H=((g-b)/d)%6; else if(mx===g)H=(b-r)/d+2; else H=(r-g)/d+4; H*=60; if(H<0)H+=360; }
  l=Math.min(1,l+dL);
  const C=(1-Math.abs(2*l-1))*s, X=C*(1-Math.abs((H/60)%2-1)), m=l-C/2;
  let R,G,B; if(H<60){R=C;G=X;B=0;}else if(H<120){R=X;G=C;B=0;}else if(H<180){R=0;G=C;B=X;}
  else if(H<240){R=0;G=X;B=C;}else if(H<300){R=X;G=0;B=C;}else{R=C;G=0;B=X;}
  const to=v=>Math.max(0,Math.min(255,Math.round((v+m)*255))).toString(16).padStart(2,'0');
  return '#'+to(R)+to(G)+to(B); }
// ベース色＋ベースを明度upした同色相をマーブルに（白が強すぎない＝実物に近い）
function marbleOf(base){ return [base, base, lighten(base,0.13), lighten(base,0.27)]; }

function getMat(fin,color,trans){ trans=trans||0; const k=fin+'|'+color+'|'+trans;

    if(trans>0){ m.transmission=Math.min(0.94,trans); m.thickness=0.9; m.ior=1.46;
      m.attenuationColor=new THREE.Color(color); m.attenuationDistance=1.3;

    matCache[k]=m; }
  return matCache[k]; }

function migrate(arr){ (arr||[]).forEach(p=>{
  if(p.type==='八角(ラメ混色・白系)'||p.type==='八角(ラメ混色・黒系)') p.type='八角(ラメ混色)';

function mergeById(localArr, driveArr){
  const by={}; (localArr||[]).forEach(p=>{ by[p.id]=p; });
  (driveArr||[]).forEach(dp=>{ const lp=by[dp.id]; if(!lp || (+dp._t||0) >= (+lp._t||0)) by[dp.id]=dp; });
  return Object.values(by);
}

function rebuild(){
  while(group.children.length) group.remove(group.children[0]);
  const beads=resolveBeads();
  const r=mkRng(seed);
  for(let i=beads.length-1;i>0;i--){ const j=Math.floor(r()*(i+1)); [beads[i],beads[j]]=[beads[j],beads[i]]; }

  world.createCollider(RAPIER.ColliderDesc.cuboid(20,0.5,20).setFriction(0.4), gb);
  // 皿の内側いっぱいに囲い
  const Rw=PLATE_R-0.28;

  for(let i=0;i<nW;i++){ const a=i/nW*Math.PI*2;
    const wb=world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(Math.cos(a)*Rw,1.2,Math.sin(a)*Rw).setRotation(quat(0,-a,0)));
    world.createCollider(RAPIER.ColliderDesc.cuboid(0.12,1.2,seg).setFriction(0.15), wb);
  }
  // 皿いっぱいに重ならず密に敷き詰まるサイズに自動調整（密充填）
  const avgR=beads.length? beads.reduce((a,m)=>a+SHAPES[m.shape].geo.userData.radius,0)/beads.length:1;
  const REF=40; // この粒数でお皿が程よく埋まる。粒サイズはこの基準で固定（粒数では変えない）
  const usable=Math.PI*Math.pow(PLATE_R-0.30,2)*0.72, unit=Math.PI*avgR*avgR;
  const gscale=Math.min(1, Math.sqrt((usable/unit)/REF)); // 固定サイズ（beads.lengthに依存しない）
  const spawnR=Rw-0.1; // お皿全体に配置（粒サイズ固定なので、粒数が増えるほどお皿の上の粒が増える＝密になる）
  const bodies=[], meshes=[];
  beads.forEach((m)=>{
    const g=SHAPES[m.shape].geo, s=gscale*(0.95+r()*0.04);
    const rad=g.userData.radius*s*0.9, hh=g.userData.halfH*s;  // 当たり判定を見た目に近づけ、貫通せず当たって止まる
    const ang=r()*Math.PI*2, rr=Math.sqrt(r())*spawnR;       // 粒数に応じた範囲に配置（中央寄り→広がる）
    const bd=RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(Math.cos(ang)*rr, hh, Math.sin(ang)*rr)
      .setRotation(quat(0, r()*Math.PI*2, 0))
      .setLinearDamping(0.5).lockRotations().enabledTranslations(true,false,true); // 回転固定＋Y移動禁止＝上下に乗らない単層
    const body=world.createRigidBody(bd);
    world.createCollider(RAPIER.ColliderDesc.cylinder(hh,rad).setFriction(0.2).setRestitution(0.0), body); // 低摩擦＝滑って密に詰まる
    const me=new THREE.Mesh(g,getMat(m.finish,m.color,m.trans)); me.scale.setScalar(s); me.castShadow=true;
    group.add(me); bodies.push(body); meshes.push(me);
  });
  const steps=320;
  for(let st=0;st<steps;st++) world.step();
  bodies.forEach((b,i)=>{ const t=b.translation(), qq=b.rotation();
    meshes[i].position.set(t.x,t.y,t.z); meshes[i].quaternion.set(qq.x,qq.y,qq.z,qq.w); });
  world.free();
  // 皿サイズは固定（再配置しても皿の大きさは変わらない）。粒は固定の囲い内に高密度で充填
  plate.scale.set(1,1,1);
}

// ===== 比率ユーティリティ（合計100%按分） =====
function balance(arr,i,v,getR,setR){
  v=Math.max(0,Math.min(100,v));
  const others=arr.map((_,idx)=>idx).filter(idx=>idx!==i);
  const osum=others.reduce((a,idx)=>a+getR(idx),0), rem=100-v;
  if(osum>1e-6) others.forEach(idx=>setR(idx,getR(idx)/osum*rem));
  else if(others.length) others.forEach(idx=>setR(idx,rem/others.length));
  setR(i,v);
}
function setRatio(i,v){ balance(recipe,i,v,k=>recipe[k].ratio,(k,x)=>recipe[k].ratio=x); }
function setCompRatio(p,i,v){ balance(p.comps,i,v,k=>p.comps[k].ratio,(k,x)=>p.comps[k].ratio=x); }
function normalizeRecipe(){ const s=recipe.reduce((a,r)=>a+Math.max(0,r.ratio),0)||1; recipe.forEach(r=>r.ratio=Math.max(0,r.ratio)/s*100); }
function normComps(p){ const s=p.comps.reduce((a,c)=>a+Math.max(0,c.ratio),0)||1; p.comps.forEach(c=>c.ratio=Math.max(0,c.ratio)/s*100); }

// ===== 商品→粒の解決 =====
function recipeCounts(){
  const valid=recipe.map((r,i)=>({r,i})).filter(o=>o.r.ratio>0 && productById(o.r.pid));
  const sum=valid.reduce((a,o)=>a+o.r.ratio,0)||1;
  const counts=recipe.map(()=>0);
  valid.forEach(o=>{ counts[o.i]=Math.max(0,Math.round(o.r.ratio/sum*total)); });
  valid.forEach(o=>{ const p=productById(o.r.pid); if(p.comps.length>1 && counts[o.i]<p.comps.length) counts[o.i]=p.comps.length; });
  return counts;
}
function splitByComps(p,n){
  const cs=p.comps, base=cs.length>1?1:0, sum=cs.reduce((a,c)=>a+Math.max(0,c.ratio),0)||1;
  let arr=cs.map(c=>Math.max(base,Math.round(Math.max(0,c.ratio)/sum*n)));
  let diff=n-arr.reduce((a,b)=>a+b,0), gi=0;
  while(diff!==0 && cs.length){ const i=gi%cs.length; if(diff>0){arr[i]++;diff--;} else if(arr[i]>base){arr[i]--;diff++;} gi++; if(gi>3000)break; }
  return arr;
}
function resolveBeads(){
  const counts=recipeCounts(), beads=[];
  recipe.forEach((r,i)=>{ const p=productById(r.pid); if(!p||counts[i]<=0)return;
    const split=splitByComps(p,counts[i]);
    p.comps.forEach((c,ci)=>{ for(let k=0;k<split[ci];k++) beads.push({shape:c.shape,finish:c.finish,color:c.color,trans:p.trans||0}); });
  });
  return beads;
}

// ===== 実物画像から色を自動抽出（再現色に適用） =====
function _rgb2hsv(r,g,b){ r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; let h=0; if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; } return [h, mx?d/mx:0, mx]; }
function _hsv2hex(h,s,v){ const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c; let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  const t=u=>Math.max(0,Math.min(255,Math.round((u+m)*255))).toString(16).padStart(2,'0'); return '#'+t(r)+t(g)+t(b); }
function _imgPixels(src){ return new Promise(res=>{ const im=new Image(); im.onload=()=>{ const mx=Math.max(im.width,im.height)||1, sc=Math.min(1,140/mx), w=Math.max(1,Math.round(im.width*sc)), h=Math.max(1,Math.round(im.height*sc)); const cv=document.createElement('canvas'); cv.width=w;cv.height=h; const cx=cv.getContext('2d'); cx.drawImage(im,0,0,w,h); res(cx.getImageData(0,0,w,h).data); }; im.onerror=()=>res(null); im.src=src; }); }
function _beadPixels(data){ const px=[]; for(let i=0;i<data.length;i+=4){ const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3]; if(a<200)continue; if(Math.min(r,g,b)>236)continue; /*白背景*/ if(r+g+b<70)continue; /*影*/ px.push([r,g,b]); } return px; }
function _vivid(px){ const sc=px.map(p=>{ const v=_rgb2hsv(p[0],p[1],p[2]); return {p,s:v[1]*0.7+v[2]*0.3}; }); sc.sort((a,b)=>b.s-a.s); const top=sc.slice(0,Math.max(1,Math.floor(sc.length*0.45))); let r=0,g=0,b=0; top.forEach(o=>{r+=o.p[0];g+=o.p[1];b+=o.p[2];}); const n=top.length; const hsv=_rgb2hsv(r/n,g/n,b/n); return _hsv2hex(hsv[0], Math.min(1,hsv[1]*1.12), Math.min(1,hsv[2]*1.03)); }
function _kmeans(px,k,iters){ if(px.length<=k) return px.map(c=>({c,n:1})); let C=[]; for(let i=0;i<k;i++)C.push(px[Math.floor(i*(px.length-1)/(k-1))].slice()); const lab=new Array(px.length).fill(0);
  for(let it=0;it<iters;it++){ for(let i=0;i<px.length;i++){ let bd=1e9,bj=0; for(let j=0;j<k;j++){ const dx=px[i][0]-C[j][0],dy=px[i][1]-C[j][1],dz=px[i][2]-C[j][2],d=dx*dx+dy*dy+dz*dz; if(d<bd){bd=d;bj=j;} } lab[i]=bj; }
    const s=Array.from({length:k},()=>[0,0,0,0]); for(let i=0;i<px.length;i++){ const j=lab[i]; s[j][0]+=px[i][0];s[j][1]+=px[i][1];s[j][2]+=px[i][2];s[j][3]++; } for(let j=0;j<k;j++) if(s[j][3])C[j]=[s[j][0]/s[j][3],s[j][1]/s[j][3],s[j][2]/s[j][3]]; }
  const cnt=new Array(k).fill(0); lab.forEach(j=>cnt[j]++); return {C,lab,cnt}; }
function _extract3(px){ const km=_kmeans(px,6,9);
  const groups=Array.from({length:km.C.length},()=>[]); km.lab.forEach((j,i)=>groups[j].push(px[i]));
  const order=km.C.map((c,j)=>({c,n:km.cnt[j],j})).filter(o=>o.n>px.length*0.02).sort((a,b)=>b.n-a.n);
  const pick=[], picC=[];
  for(const o of order){ const [r,g,b]=o.c; if(picC.every(q=>Math.abs(q[0]-r)+Math.abs(q[1]-g)+Math.abs(q[2]-b)>48)){ pick.push(_vivid(groups[o.j])); picC.push(o.c); } if(pick.length>=3)break; }
  while(pick.length<3) pick.push(pick[pick.length-1]||'#cccccc');

async function autoExtractColors(p){ if(!p.real) return false; const data=await _imgPixels(p.real); if(!data) return false; const px=_beadPixels(data); if(px.length<20) return false;
  if(p.comps.length>=3){ const cols=_extract3(px); p.comps.forEach((c,i)=>c.color=cols[i%cols.length]); } else { const col=_vivid(px); p.comps.forEach(c=>c.color=col); }
  p._t=Date.now(); invalidateThumb(p); return true; }
async function autoExtractAll(){ const list=products.filter(p=>!p.archived && p.real); let done=0; const btn=document.getElementById('autoColor');

function startPick(realImg, realSrc, applyFn, btn){
  if(_pickCleanup){ endPick(); return; } // 押下でトグル解除
  if(!realImg || !realSrc){
    if(window.EyeDropper){ new EyeDropper().open().then(r=>applyFn(r.sRGBHex)).catch(()=>{}); }
    else alert('実物画像が無く、スポイト非対応ブラウザです。色コードを入力してください。');
    return;
  }
  let cv=null; const im=new Image();
  im.onload=()=>{ cv=document.createElement('canvas'); cv.width=im.naturalWidth; cv.height=im.naturalHeight; cv.getContext('2d').drawImage(im,0,0); };
  im.src=realSrc;
  realImg.style.cursor='crosshair'; realImg.classList.add('picking'); if(btn)btn.classList.add('on');
  const onClick=(ev)=>{ if(!cv)return; const r=realImg.getBoundingClientRect();
    const nw=cv.width,nh=cv.height, sc=Math.max(r.width/nw,r.height/nh), dw=nw*sc,dh=nh*sc, ox=(r.width-dw)/2, oy=(r.height-dh)/2;
    let sx=Math.round((ev.clientX-r.left-ox)/sc), sy=Math.round((ev.clientY-r.top-oy)/sc);
    sx=Math.max(0,Math.min(nw-1,sx)); sy=Math.max(0,Math.min(nh-1,sy));
    const d=cv.getContext('2d').getImageData(sx,sy,1,1).data;
    applyFn('#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('')); };
  realImg.addEventListener('click',onClick);
  const onEsc=(e)=>{ if(e.key==='Escape') endPick(); };
  document.addEventListener('keydown',onEsc);
  const bar=document.createElement('div'); bar.className='pickbar'; bar.innerHTML='<b>スポイト中</b>　実物をクリックで色取得';
  const done=document.createElement('button'); done.textContent='完了'; done.onclick=endPick; bar.append(done);
  document.body.append(bar);
  _pickCleanup=()=>{ realImg.style.cursor=''; realImg.classList.remove('picking'); if(btn)btn.classList.remove('on'); realImg.removeEventListener('click',onClick); document.removeEventListener('keydown',onEsc); bar.remove(); };
}
function renderRegistry(){
  endPick();
  regEl.innerHTML='';
  const q=(document.getElementById('regSearch')?.value||'').trim().toLowerCase();
  const pool=products.filter(p=> showArchive? p.archived : !p.archived);
  const list=q? pool.filter(p=>((p.name||'')+(p.sku||'')+(p.psku||'')).toLowerCase().includes(q)) : pool;
  const nArch=products.filter(p=>p.archived).length, nActive=products.length-nArch;
  const cnt=document.getElementById('regCount'); if(cnt) cnt.textContent= showArchive? ('アーカイブ '+list.length+'件') : (list.length+'/'+nActive);
  const ab=document.getElementById('archiveToggle'); if(ab) ab.textContent= showArchive? '← 商品一覧へ戻る' : ('🗑 アーカイブ ('+nArch+')');
  if(showArchive){
    if(!list.length){ const e=document.createElement('p'); e.className='sub'; e.textContent='アーカイブは空です。'; regEl.append(e); }
    list.forEach(p=>{
      const card=document.createElement('div'); card.className='regcard';
      const head=document.createElement('div'); head.className='reg-head';
      const img=document.createElement('img'); img.className='pthumb sm'; img.src=makeThumb(p);
      const ttl=document.createElement('div'); ttl.className='regttl'; ttl.textContent=(p.name||'(無名)')+'  '+(p.sku||'');
      head.append(img,ttl); card.append(head);
      const bar=document.createElement('div'); bar.className='savebar';
      const rs=document.createElement('button'); rs.className='save'; rs.textContent='復元'; rs.onclick=()=>restoreProduct(p);
      const pg=document.createElement('button'); pg.className='danger'; pg.textContent='完全に削除'; pg.onclick=()=>{ if(confirm('「'+(p.name||'')+'」を完全に削除します。\nこの操作は元に戻せません。よろしいですか？'))purgeProduct(p); };
      bar.append(rs,pg); card.append(bar); regEl.append(card);
    });
    return;
  }
  list.forEach(p=>{
    if(!p.type) p.type='八角(マット)';
    const ed=editing.has(p.id);
    const card=document.createElement('div'); card.className='regcard'+(ed?' editing':'');
    const head=document.createElement('div'); head.className='reg-head';
    const ttl=document.createElement('div'); ttl.className='regttl'; ttl.textContent=p.name||'(無名)';
    head.append(ttl);
    if(!ed){ const eb=document.createElement('button'); eb.className='editbtn'; eb.textContent='編集'; eb.onclick=()=>startEdit(p); head.append(eb); }
    card.append(head);
    // 実物 ／ 再現 の2枚
    const ir=document.createElement('div'); ir.className='imgrow';
    const fig=(src,cap,extra)=>{ const f=document.createElement('figure'); f.className='imgfig'; let el; if(src){el=document.createElement('img');el.className='bigimg';el.src=src;}else{el=document.createElement('div');el.className='bigimg noimg';el.textContent='画像なし';} const cp=document.createElement('figcaption');cp.textContent=cap; f.append(el,cp); if(extra)f.append(extra); return f; };
    let realExtra=null;
    if(ed){
      const up=document.createElement('label'); up.className='upbtn'; up.textContent=p.real?'画像を変更':'画像を追加';
      const fi=document.createElement('input'); fi.type='file'; fi.accept='image/*'; fi.style.display='none';
      fi.onchange=e=>{ const file=e.target.files[0]; if(!file)return; const rd=new FileReader(); rd.onload=()=>{ const im=new Image(); im.onload=()=>{ const sc=Math.min(168/im.width,168/im.height,1); const cv=document.createElement('canvas'); cv.width=Math.round(im.width*sc); cv.height=Math.round(im.height*sc); cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height); p.real=cv.toDataURL('image/jpeg',0.8); renderRegistry(); }; im.src=rd.result; }; rd.readAsDataURL(file); };
      up.append(fi); realExtra=up;
    }
    ir.append(fig(p.real,'実物',realExtra), fig(makeThumb(p),'再現（シミュレーター）'));
    card.append(ir);
    const _bigs=ir.querySelectorAll('.bigimg'); const simImg=_bigs[_bigs.length-1]; // 再現サムネ（即時プレビュー用）
    const realImg=(p.real && _bigs.length>1)? _bigs[0] : null; // 実物画像（スポイト元）
    const field=(lab,el)=>{ const r=document.createElement('div'); r.className='frow'; const l=document.createElement('label'); l.textContent=lab; r.append(l,el); card.append(r); };
    if(!ed){
      // 閲覧モード（読み取り専用）
      const vval=t=>{ const s=document.createElement('span'); s.className='vval'; s.textContent=t||'—'; return s; };
      field('型', vval(p.type));
      field('自社SKU', vval(p.sku));
      field('発注品番', vval(p.psku));
      const cr=document.createElement('div'); cr.className='frow';
      const cl=document.createElement('label'); cl.textContent=p.comps.length>1?'色（'+p.comps.length+'色）':'色'; cr.append(cl);
      p.comps.forEach(c=>{ const sw=document.createElement('span'); sw.className='vsw'; sw.style.background=c.color; cr.append(sw); });
      card.append(cr);
      if(p.trans>0) field('透け感', vval(Math.round(p.trans*100)+'%'));
    }else{
      // 編集モード
      const txt=(key,ph,after)=>{ const inp=document.createElement('input'); inp.className='skuin'; inp.placeholder=ph; inp.value=p[key]||''; inp.oninput=()=>{p[key]=inp.value; if(after)after(inp.value);}; return inp; };
      field('自社商品名', txt('name','自社商品名',v=>{ttl.textContent=v||'(無名)';}));
      const tsel=document.createElement('select');
      Object.keys(TYPES).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;if(k===p.type)o.selected=true;tsel.appendChild(o);});
      tsel.onchange=()=>{ p.type=tsel.value; p.comps=compsFor(p.type,p.comps.map(c=>c.color)); invalidateThumb(p); renderRegistry(); };
      field('型', tsel);
      field('自社SKU', txt('sku','WS-WAX-…'));
      field('発注品番', txt('psku','PW-… / DIY-…'));
      const cr=document.createElement('div'); cr.className='frow';
      const cl=document.createElement('label'); cl.textContent=p.comps.length>1?'色（'+p.comps.length+'色）':'色'; cr.append(cl);
      p.comps.forEach(c=>{
        const wrap=document.createElement('div'); wrap.className='colcell';
        const cc=document.createElement('input'); cc.type='color'; cc.value=c.color;
        const hx=document.createElement('input'); hx.className='hexin'; hx.value=c.color; hx.maxLength=7; hx.spellcheck=false; hx.placeholder='#RRGGBB';
        const ey=document.createElement('button'); ey.type='button'; ey.className='eyebtn'; ey.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7a5c3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.12 2.12 0 1 1 3 3L18 9l.4.4a2.12 2.12 0 1 1-3 3l-3.8-3.8a2.12 2.12 0 1 1 3-3l.4.4Z"/></svg>'; ey.title='実物から色を取る（スポイト）';
        const apply=(hex,from)=>{ if(!/^#?[0-9a-fA-F]{6}$/.test(hex.trim()))return; hex=hex.trim(); if(hex[0]!=='#')hex='#'+hex; c.color=hex; if(from!=='cc')cc.value=hex; if(from!=='hx')hx.value=hex; invalidateThumb(p); if(simImg)simImg.src=makeThumb(p); };
        cc.oninput=()=>apply(cc.value,'cc');   // ドラッグ中も即時プレビュー
        hx.oninput=()=>apply(hx.value,'hx');
        ey.onclick=()=>startPick(realImg, p.real, hex=>apply(hex,'ey'), ey);
        wrap.append(cc,hx,ey); cr.append(wrap);
      });
      if(p.real){ const ae=document.createElement('button'); ae.type='button'; ae.className='autobtn'; ae.textContent='🎨 実物から自動抽出';
        ae.onclick=async()=>{ ae.textContent='抽出中…'; await autoExtractColors(p); renderRegistry(); }; cr.append(ae); }
      card.append(cr);
      // 透け感（半透明）
      const trow=document.createElement('div'); trow.className='frow';
      const tll=document.createElement('label'); tll.textContent='透け感';
      const trng=document.createElement('input'); trng.type='range'; trng.min=0; trng.max=100; trng.value=Math.round((p.trans||0)*100); trng.style.flex='1';
      const tvv=document.createElement('span'); tvv.className='vval'; tvv.style.flex='0 0 auto'; tvv.textContent=trng.value+'%';
      trng.oninput=()=>{ tvv.textContent=trng.value+'%'; };
      trng.onchange=()=>{ p.trans=(+trng.value)/100; invalidateThumb(p); renderRegistry(); };
      trow.append(tll,trng,tvv); card.append(trow);
      const bar=document.createElement('div'); bar.className='savebar';
      const sv=document.createElement('button'); sv.className='save'; sv.textContent='保存'; sv.onclick=()=>saveEdit(p);
      const ca=document.createElement('button'); ca.className='cancel'; ca.textContent='キャンセル'; ca.onclick=()=>cancelEdit(p);
      const dl=document.createElement('button'); dl.className='danger'; dl.textContent='削除'; dl.onclick=()=>{ if(confirm('「'+(p.name||'')+'」を削除します。\n（アーカイブに移動し、後で復元できます）\nよろしいですか？'))archiveProduct(p); };
      bar.append(sv,ca,dl); card.append(bar);
    }
    regEl.append(card);
  });
}
document.getElementById('addProd').onclick=()=>{ const s=document.getElementById('regSearch'); if(s)s.value=''; showArchive=false; const id=pidSeq++; products.unshift({id,type:'八角(マット)',name:'新規商品',sku:'',psku:'',_t:Date.now(),comps:compsFor('八角(マット)',['#3C8C82'])}); newIds.add(id); editing.add(id); saveProducts(); renderRegistry(); regView.scrollTop=0; };
document.getElementById('archiveToggle').onclick=()=>{ showArchive=!showArchive; const s=document.getElementById('regSearch'); if(s)s.value=''; renderRegistry(); regView.scrollTop=0; };
document.getElementById('autoColor').onclick=()=>{ if(showArchive)return; if(confirm('表示中の全商品の色を、実物画像から自動抽出して上書きします。\n（個別に手動修正した色も上書きされます）\nよろしいですか？')) autoExtractAll(); };
document.getElementById('cardSearch').oninput=()=>renderCards();
document.getElementById('regSearch').oninput=()=>renderRegistry();

// ===== ハンドラ =====
document.getElementById('shuffleBtn').onclick=()=>{ seed=(seed*16807+1)&0x7fffffff; rebuild(); };
const totalRange=document.getElementById('totalRange'), totalVal=document.getElementById('totalVal');
totalRange.oninput=()=>{ total=+totalRange.value; totalVal.textContent=total; updateValues(); };
totalRange.onchange=()=>{ total=+totalRange.value; totalVal.textContent=total; updateValues(); rebuild(); };
document.getElementById('saveBtn').onclick=()=>{ renderer.render(scene,camera); const a=document.createElement('a'); a.download='wax-mix.png'; a.href=renderer.domElement.toDataURL('image/png'); a.click(); };
showTab(location.hash==='#products'?'reg':'sim');
pullShared(); // 起動時に共有データを取得（あれば全員共通のデータで上書き）

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
function loop(){controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
loop();
</script>
