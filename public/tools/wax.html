<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import RAPIER from '@dimforge/rapier3d-compat';
await RAPIER.init();

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#f6f6f6');

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.1,100);
camera.position.set(0,14,8);

const controls=new OrbitControls(camera,canvas);
controls.target.set(0,0,0);
controls.enableDamping=true;
controls.maxPolarAngle=Math.PI*0.49;

// lights
const key=new THREE.DirectionalLight(0xffffff,2.4);
key.position.set(5,9,4);
key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=1;key.shadow.camera.far=40;
key.shadow.camera.left=-10;key.shadow.camera.right=10;key.shadow.camera.top=10;key.shadow.camera.bottom=-10;
key.shadow.bias=-0.0003;
key.shadow.radius=7;
scene.add(key);
const fill=new THREE.DirectionalLight(0xffffff,0.6); fill.position.set(-6,4,-3); scene.add(fill);
scene.add(new THREE.HemisphereLight(0xffffff,0x9a948c,0.95));
scene.add(new THREE.AmbientLight(0xffffff,0.25));

// ground (catch soft shadow only, keep bg color)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.ShadowMaterial({opacity:0.16}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

// お皿（ワックスを流し出すシーン）
const PLATE_R=4.4;
const dishMat=new THREE.MeshPhysicalMaterial({color:'#f4f1ea',roughness:0.45,clearcoat:0.5,clearcoatRoughness:0.35,envMapIntensity:0.9});
const plate=new THREE.Group();
const dishBase=new THREE.Mesh(new THREE.CylinderGeometry(PLATE_R,PLATE_R*0.82,0.34,72), dishMat);
dishBase.position.y=-0.17; dishBase.receiveShadow=true; plate.add(dishBase);
const dishRim=new THREE.Mesh(new THREE.TorusGeometry(PLATE_R,0.17,18,72), dishMat);
dishRim.rotation.x=Math.PI/2; dishRim.position.y=0.04; dishRim.receiveShadow=true; plate.add(dishRim);
scene.add(plate);

// ---- 形のジオメトリ（八角・星 共通の立体化）----
function solidify(shape,H,BEV,dome,Rtop){
  const geo=new THREE.ExtrudeGeometry(shape,{
    depth:H, bevelEnabled:true, bevelThickness:BEV, bevelSize:BEV, bevelSegments:9, curveSegments:8
  });
  geo.rotateX(-Math.PI/2); geo.center();
  // 天面・底面をドーム状にふくらませる（ぷっくり感）
  const pos=geo.attributes.position;
  let maxY=-1e9,minY=1e9;
  for(let i=0;i<pos.count;i++){const y=pos.getY(i);maxY=Math.max(maxY,y);minY=Math.min(minY,y);}
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const r2=Math.min(1,(x*x+z*z)/(Rtop*Rtop));
    if(y>maxY-1e-3) pos.setY(i, y+dome*(1-r2));
    else if(y<minY+1e-3) pos.setY(i, y-dome*0.5*(1-r2));
  }
  pos.needsUpdate=true; geo.computeVertexNormals();
  geo.computeBoundingBox(); geo.userData.rest=-geo.boundingBox.min.y;
  return geo;
}
function octaShape(R){const s=new THREE.Shape();for(let i=0;i<8;i++){const a=Math.PI/8+i*Math.PI/4;const x=Math.cos(a)*R,y=Math.sin(a)*R;i===0?s.moveTo(x,y):s.lineTo(x,y);}s.closePath();return s;}
// 角を丸めた星（ぷっくり星用）
function roundedStarShape(Ro,Ri,pts,round){
  const n=pts*2, V=[];
  for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI/pts;const r=(i%2===0)?Ro:Ri;V.push([Math.cos(a)*r,Math.sin(a)*r]);}
  const s=new THREE.Shape();
  for(let i=0;i<n;i++){
    const p=V[(i-1+n)%n], c=V[i], q=V[(i+1)%n];
    const d1=[p[0]-c[0],p[1]-c[1]], d2=[q[0]-c[0],q[1]-c[1]];
    const l1=Math.hypot(d1[0],d1[1])||1, l2=Math.hypot(d2[0],d2[1])||1;
    const rr=Math.min(round, l1*0.45, l2*0.45);
    const a1=[c[0]+d1[0]/l1*rr, c[1]+d1[1]/l1*rr];
    const a2=[c[0]+d2[0]/l2*rr, c[1]+d2[1]/l2*rr];
    i===0?s.moveTo(a1[0],a1[1]):s.lineTo(a1[0],a1[1]);
    s.quadraticCurveTo(c[0],c[1],a2[0],a2[1]);
  }
  s.closePath(); return s;
}

// アウトラインを中心がぷっくり膨らむクッション状に立体化（風船インフレート）
function puffGeo(outline, peakTop, peakBot, J, I){
  const B=outline.map(p=>({a:Math.atan2(p.y,p.x), r:Math.hypot(p.x,p.y)})).sort((u,v)=>u.a-v.a);
  function bR(a){
    a=((a+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI)-Math.PI;
    if(a<=B[0].a||a>=B[B.length-1].a){ const c=B[B.length-1], n=B[0], span=(n.a+2*Math.PI)-c.a;
      const f=((a<B[0].a?a+2*Math.PI:a)-c.a)/span; return c.r+(n.r-c.r)*f; }
    for(let i=0;i<B.length-1;i++){ if(a>=B[i].a&&a<=B[i+1].a){ const f=(a-B[i].a)/((B[i+1].a-B[i].a)||1); return B[i].r+(B[i+1].r-B[i].r)*f; } }
    return B[0].r;
  }
  const pos=[], idx=[];
  function surf(sign,peak){
    const base=pos.length/3;
    pos.push(0,sign*peak,0);
    for(let j=1;j<=J;j++){
      const t=j/J, prof=Math.sqrt(Math.max(0,1-t*t)), y=sign*peak*prof;
      for(let i=0;i<I;i++){ const a=i/I*Math.PI*2, R=bR(a)*t; pos.push(Math.cos(a)*R, y, Math.sin(a)*R); }
    }
    const c0=base;
    for(let i=0;i<I;i++){ const b=base+1+i, c=base+1+(i+1)%I; sign>0?idx.push(c0,c,b):idx.push(c0,b,c); }
    for(let j=1;j<J;j++){ const r0=base+1+(j-1)*I, r1=base+1+j*I;
      for(let i=0;i<I;i++){ const i2=(i+1)%I, A=r0+i,Bb=r0+i2,C=r1+i,D=r1+i2;
        sign>0?idx.push(A,Bb,C,Bb,D,C):idx.push(A,C,Bb,Bb,C,D); } }
  }
  surf(1,peakTop); surf(-1,peakBot);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y;
  return g;
}

// 向日葵（花びらの縁＋中央の種ディスク）
function sunflowerGeo(opts){
  const o=Object.assign({P:16,Rtip:1.06,Rvalley:0.82,petalAmp:0.30,centerAmp:0.16,bodyTop:0.13,peakBot:0.34,J:32,I:320},opts||{});
  const bRad=a=> o.Rvalley + (o.Rtip-o.Rvalley)*(0.5+0.5*Math.cos(o.P*a));
  const edgeRound=t=>Math.max(0,Math.min(1,(1-t)/0.16));                     // 縁を丸める＝厚みのある外周
  function topY(t,a){
    const pr=Math.sin(Math.PI*Math.min(1,Math.max(0,(t-0.30)/0.70)));        // 花びらの稜線（外周帯）
    const mask=0.5+0.5*Math.cos(o.P*a);                                       // 花びら山＞谷
    const petal=o.petalAmp*pr*(0.45+0.55*mask);
    let disc=0; if(t<0.40){ const u=t/0.40; disc=o.centerAmp*(1-u*u); }       // 中央の種ディスク
    return edgeRound(t)*(o.bodyTop+petal+disc);                               // 全体に厚み＋縁丸め
  }
  const pos=[], idx=[];
  function surf(sign){
    const base=pos.length/3;
    pos.push(0, sign>0?topY(0,0):-o.peakBot, 0);
    for(let j=1;j<=o.J;j++){ const t=j/o.J;
      for(let i=0;i<o.I;i++){ const a=i/o.I*Math.PI*2, R=bRad(a)*t;
        const y= sign>0? topY(t,a) : -o.peakBot*edgeRound(t);
        pos.push(Math.cos(a)*R, y, Math.sin(a)*R); } }
    const c0=base;
    for(let i=0;i<o.I;i++){ const b=base+1+i,c=base+1+(i+1)%o.I; sign>0?idx.push(c0,c,b):idx.push(c0,b,c); }
    for(let j=1;j<o.J;j++){ const r0=base+1+(j-1)*o.I,r1=base+1+j*o.I;
      for(let i=0;i<o.I;i++){ const i2=(i+1)%o.I,A=r0+i,Bb=r0+i2,C=r1+i,D=r1+i2;
        sign>0?idx.push(A,Bb,C,Bb,D,C):idx.push(A,C,Bb,Bb,C,D); } }
  }
  surf(1); surf(-1);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y;
  return g;
}

// 桜っぽい5弁花（太く丸い花びら＋中央の小さな突起）
function blossomGeo(opts){
  const o=Object.assign({P:4,Rtip:1.0,Rvalley:0.5,bodyTop:0.34,domeAmp:0.09,knobAmp:0.15,veinAmp:0.05,veinsPer:6,peakBot:0.28,J:44,I:380},opts||{});
  const mfn=a=>0.5+0.5*Math.cos(o.P*a);
  const bRad=a=> o.Rvalley + (o.Rtip-o.Rvalley)*Math.pow(mfn(a),0.32);  // 幅広・隣とほぼ接する4花びら
  const edgeRound=t=>Math.max(0,Math.min(1,(1-t)/0.13));
  function topY(t,a){
    const pm=Math.pow(mfn(a),0.5);                                      // 花びら＞谷（谷＝花びら間の溝）
    const flat=o.bodyTop*(0.22+0.78*pm);                                // 平たい花びら面（谷は低い）
    const dome=o.domeAmp*Math.max(0,1-Math.pow((t-0.55)/0.55,2))*pm;    // ごく緩い凸
    const band=Math.max(0,Math.min(1,(t-0.16)/0.20))*Math.max(0,Math.min(1,(0.95-t)/0.2));
    const vein=o.veinAmp*(0.5+0.5*Math.cos(o.P*o.veinsPer*a))*band*pm;  // 放射状の葉脈の筋
    let knob=0; if(t<0.15){ const u=t/0.15; knob=o.knobAmp*(1-u*u); }   // 中央のしべ
    return edgeRound(t)*(flat+dome+vein+knob);
  }
  const pos=[], idx=[];
  function surf(sign){
    const base=pos.length/3;
    pos.push(0, sign>0?topY(0,0):-o.peakBot, 0);
    for(let j=1;j<=o.J;j++){ const t=j/o.J;
      for(let i=0;i<o.I;i++){ const a=i/o.I*Math.PI*2, R=bRad(a)*t;
        const y= sign>0? topY(t,a) : -o.peakBot*edgeRound(t);
        pos.push(Math.cos(a)*R, y, Math.sin(a)*R); } }
    const c0=base;
    for(let i=0;i<o.I;i++){ const b=base+1+i,c=base+1+(i+1)%o.I; sign>0?idx.push(c0,c,b):idx.push(c0,b,c); }
    for(let j=1;j<o.J;j++){ const r0=base+1+(j-1)*o.I,r1=base+1+j*o.I;
      for(let i=0;i<o.I;i++){ const i2=(i+1)%o.I,A=r0+i,Bb=r0+i2,C=r1+i,D=r1+i2;
        sign>0?idx.push(A,Bb,C,Bb,D,C):idx.push(A,C,Bb,Bb,C,D); } }
  }
  surf(1); surf(-1);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y;
  return g;
}

const geoOcta=solidify(octaShape(0.78), 0.52, 0.2, 0.12, 0.58);
const geoStar=puffGeo(roundedStarShape(1.5,0.9,5,0.22).getPoints(180), 0.62, 0.5, 20, 160);
const geoFlower=sunflowerGeo();
const geoBlossom=blossomGeo();

// --- 絵柄シルエットを八角と同じ要領で「描いて押し出す」 ---
function ellipseShape(rx,ry,cx,cy){ const s=new THREE.Shape(); const N=56;
  for(let i=0;i<=N;i++){const a=i/N*Math.PI*2,x=(cx||0)+Math.cos(a)*rx,y=(cy||0)+Math.sin(a)*ry; i===0?s.moveTo(x,y):s.lineTo(x,y);} return s; }
function extrudeFlat(shape,H,BEV){ const g=new THREE.ExtrudeGeometry(shape,{depth:H,bevelEnabled:true,bevelThickness:BEV,bevelSize:BEV,bevelSegments:6,curveSegments:6}); g.rotateX(-Math.PI/2); return g; }
function domeFinish(geo,dome){
  geo.computeBoundingBox(); const bb=geo.boundingBox;
  const cx=(bb.min.x+bb.max.x)/2, cz=(bb.min.z+bb.max.z)/2, span=Math.max(bb.max.x-bb.min.x,bb.max.z-bb.min.z)/2;
  const pos=geo.attributes.position, maxY=bb.max.y, minY=bb.min.y;
  for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const r2=Math.min(1,((x-cx)**2+(z-cz)**2)/((span*span)||1));
    if(y>maxY-1e-3) pos.setY(i,y+dome*(1-r2)); else if(y<minY+1e-3) pos.setY(i,y-dome*0.5*(1-r2)); }
  pos.needsUpdate=true; geo.computeVertexNormals();
  geo.computeBoundingBox(); geo.userData.rest=-geo.boundingBox.min.y; return geo;
}
// 四つ葉のクローバー（丸い4葉）
function cloverShape(){ const s=new THREE.Shape(); const N=220, Rmin=0.3, Rmax=1.0;
  for(let i=0;i<=N;i++){ const a=i/N*Math.PI*2, r=Rmin+(Rmax-Rmin)*Math.pow(Math.abs(Math.cos(2*a)),0.5);
    const x=Math.cos(a)*r, y=Math.sin(a)*r; i===0?s.moveTo(x,y):s.lineTo(x,y);} s.closePath(); return s; }
// 扇（要から広がる扇型・上辺スカラップ）
function fanShape(){ const s=new THREE.Shape(); const A=[0,-1.0], L=1.95, span=1.05, blades=5, N=90;
  s.moveTo(A[0],A[1]);
  for(let i=0;i<=N;i++){ const t=i/N, ang=Math.PI/2 - span/2 + span*t;
    const sc=1-0.09*(0.5+0.5*Math.cos(2*Math.PI*blades*t));
    s.lineTo(A[0]+Math.cos(ang)*L*sc, A[1]+Math.sin(ang)*L*sc); }
  s.closePath(); return s; }
// ミツバチ（体＋頭＋羽を合成して押し出し）
function beeGeo(){
  const H=0.4, BEV=0.12, P=[];
  P.push(extrudeFlat(ellipseShape(0.5,0.72,0,-0.05),H,BEV));   // 体
  P.push(extrudeFlat(ellipseShape(0.3,0.3,0,0.78),H,BEV));     // 頭
  const wl=extrudeFlat(ellipseShape(0.44,0.24),H,BEV); wl.rotateY(0.55); wl.translate(-0.52,0,-0.2); P.push(wl);
  const wr=extrudeFlat(ellipseShape(0.44,0.24),H,BEV); wr.rotateY(-0.55); wr.translate(0.52,0,-0.2); P.push(wr);
  const g=mergeGeometries(P,false); g.center();
  return domeFinish(g,0.13);
}
// 四つ葉（細密ポーラー面＋各葉の中央に葉脈の溝）
function cloverGeo(opts){
  const o=Object.assign({Rmin:0.42,Rmax:1.0,bodyTop:0.32,veinDepth:0.07,peakBot:0.26,J:46,I:420},opts||{});
  const lobe=a=>Math.pow(Math.abs(Math.cos(2*a)),0.5);                 // 4葉：0/90/180/270°が頂点
  const leafDist=a=>{ const m=((a%(Math.PI/2))+Math.PI/2)%(Math.PI/2); return Math.min(m,Math.PI/2-m); };
  const bRad=a=>{ const notch=0.5*Math.exp(-Math.pow(leafDist(a)/0.14,2)); // 葉先のハートの切れ込み
    return o.Rmin + (o.Rmax-o.Rmin)*lobe(a)*(1-notch); };
  const edgeRound=t=>Math.max(0,Math.min(1,(1-t)/0.13));
  function topY(t,a){
    const lm=Math.pow(lobe(a),0.5);
    const flat=o.bodyTop*(0.2+0.8*lm);
    const m=((a%(Math.PI/2))+Math.PI/2)%(Math.PI/2), d=Math.min(m,Math.PI/2-m); // 最寄りの葉軸までの角距離
    const veinLine=Math.exp(-Math.pow(d/0.10,2));
    const band=Math.max(0,Math.min(1,(t-0.15)/0.2))*Math.max(0,Math.min(1,(0.95-t)/0.22));
    const vein=-o.veinDepth*veinLine*band*lm;                          // 葉の中央に溝
    return edgeRound(t)*(flat+vein);
  }
  const pos=[], idx=[];
  function surf(sign){
    const base=pos.length/3;
    pos.push(0, sign>0?topY(0,0):-o.peakBot, 0);
    for(let j=1;j<=o.J;j++){ const t=j/o.J;
      for(let i=0;i<o.I;i++){ const a=i/o.I*Math.PI*2, R=bRad(a)*t;
        const y=sign>0?topY(t,a):-o.peakBot*edgeRound(t);
        pos.push(Math.cos(a)*R,y,Math.sin(a)*R); } }
    const c0=base;
    for(let i=0;i<o.I;i++){ const b=base+1+i,c=base+1+(i+1)%o.I; sign>0?idx.push(c0,c,b):idx.push(c0,b,c); }
    for(let j=1;j<o.J;j++){ const r0=base+1+(j-1)*o.I,r1=base+1+j*o.I;
      for(let i=0;i<o.I;i++){ const i2=(i+1)%o.I,A=r0+i,Bb=r0+i2,C=r1+i,D=r1+i2;
        sign>0?idx.push(A,Bb,C,Bb,D,C):idx.push(A,C,Bb,Bb,C,D); } }
  }
  surf(1); surf(-1);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y; return g;
}
// 扇（要から放射するセクター面＋骨リブの溝）
function fanGeo(opts){
  const o=Object.assign({L:1.9,span:1.55,ribs:7,bodyTop:0.32,ribDepth:0.07,peakBot:0.22,notch:0.2,Nv:36,Nu:140},opts||{});
  const apex=[0,-1.0];
  const scAt=u=>1 - o.notch*Math.exp(-Math.pow((u-0.5)/0.07,2)); // 頂部中央に銀杏の切れ込み（イチョウ）
  function P(u,v){ const ang=Math.PI/2 - o.span/2 + o.span*u, r=v*o.L*scAt(u);
    return [apex[0]+Math.cos(ang)*r, -(apex[1]+Math.sin(ang)*r)]; }
  const eu=u=>Math.max(0,Math.min(1,Math.min(u/0.05,(1-u)/0.05)));
  const ev=v=>Math.max(0,Math.min(1,Math.min(v/0.06,(1-v)/0.1)));
  function topY(u,v){ const edge=eu(u)*ev(v);
    const rib=-o.ribDepth*Math.pow(0.5+0.5*Math.cos(2*Math.PI*o.ribs*u),2);  // 要から放射する骨の溝
    const band=Math.max(0,Math.min(1,(v-0.12)/0.18));
    return edge*(o.bodyTop+rib*band); }
  const pos=[], idx=[], W=o.Nu+1;
  function surf(sign){ const base=pos.length/3;
    for(let j=0;j<=o.Nv;j++){ const v=j/o.Nv;
      for(let i=0;i<=o.Nu;i++){ const u=i/o.Nu, p=P(u,v);
        const y=sign>0?topY(u,v):-o.peakBot*eu(u)*ev(v);
        pos.push(p[0],y,p[1]); } }
    for(let j=0;j<o.Nv;j++){ for(let i=0;i<o.Nu;i++){
      const A=base+j*W+i,B=base+j*W+i+1,C=base+(j+1)*W+i,D=base+(j+1)*W+i+1;
      sign>0?idx.push(A,C,B,B,C,D):idx.push(A,B,C,B,D,C); } }
  }
  surf(1); surf(-1);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals(); g.center();
  g.computeBoundingBox(); g.userData.rest=-g.boundingBox.min.y; return g;
}

// 自作ジオメトリにUVが無いとマップが効かない → 上面投影でUV付与
function addPlanarUV(geo){ geo.computeBoundingBox(); const bb=geo.boundingBox;
  const sx=(bb.max.x-bb.min.x)||1, sz=(bb.max.z-bb.min.z)||1, pos=geo.attributes.position, uv=new Float32Array(pos.count*2);
  for(let i=0;i<pos.count;i++){ uv[i*2]=(pos.getX(i)-bb.min.x)/sx; uv[i*2+1]=(pos.getZ(i)-bb.min.z)/sz; }
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2)); return geo; }
// 物理用に：原点を重心へ寄せ、コライダー寸法（半径・半高）を算出＋UV付与
function finalizeGeo(g){
  g.computeBoundingBox(); let b=g.boundingBox;
  g.translate(-(b.min.x+b.max.x)/2, -(b.min.y+b.max.y)/2, -(b.min.z+b.max.z)/2);
  g.computeBoundingBox(); b=g.boundingBox;
  g.userData.radius=Math.max(b.max.x-b.min.x, b.max.z-b.min.z)/2;
  g.userData.halfH=Math.max(0.06,(b.max.y-b.min.y)/2);
  addPlanarUV(g);
}

// ---- 蝋らしさ＋4仕上げ：手続き生成テクスチャ ----
function makeBump(size,blobs,contrast,soft,rep){
  const c=document.createElement('canvas'); c.width=c.height=size; const x=c.getContext('2d');
  x.fillStyle='#808080'; x.fillRect(0,0,size,size);
  for(let i=0;i<blobs;i++){ const r=soft*(0.4+Math.random())*size, px=Math.random()*size, py=Math.random()*size,
    col=Math.round(128+(Math.random()*2-1)*contrast), g=x.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,`rgba(${col},${col},${col},0.55)`); g.addColorStop(1,'rgba(128,128,128,0)');
    x.fillStyle=g; x.beginPath(); x.arc(px,py,r,0,7); x.fill(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rep||2,rep||2); return t;
}
function makeSparkle(size,dots,rep){
  const c=document.createElement('canvas'); c.width=c.height=size; const x=c.getContext('2d');
  x.fillStyle='#000'; x.fillRect(0,0,size,size);
  for(let i=0;i<dots;i++){ const px=Math.random()*size,py=Math.random()*size,r=Math.random()*1.6+0.4;
    x.fillStyle=`rgba(255,255,255,${0.6+Math.random()*0.4})`; x.beginPath(); x.arc(px,py,r,0,7); x.fill(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rep||3,rep||3); return t;
}

const sparkleRough=(function(){ const c=document.createElement('canvas'); c.width=c.height=256; const x=c.getContext('2d');
  x.fillStyle='#fff'; x.fillRect(0,0,256,256);
  for(let i=0;i<900;i++){ const px=Math.random()*256,py=Math.random()*256,r=Math.random()*1.6+0.4;
    x.fillStyle='rgba(0,0,0,0.95)'; x.beginPath(); x.arc(px,py,r,0,7); x.fill(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,3); return t; })();
function makeMarble(cols,size){ size=size||512; const c=document.createElement('canvas'); c.width=c.height=size; const x=c.getContext('2d');
  const hx=h=>{h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
  x.fillStyle=cols[0]; x.fillRect(0,0,size,size);
  for(let i=0;i<170;i++){ const rgb=hx(cols[1+Math.floor(Math.random()*(cols.length-1))]);
    const px=Math.random()*size, py=Math.random()*size, rr=size*(0.07+Math.random()*0.24), a=0.4+Math.random()*0.45;
    x.save(); x.translate(px,py); x.rotate(Math.random()*Math.PI); x.scale(1,0.3+Math.random()*0.5);
    const g=x.createRadialGradient(0,0,0,0,0,rr);
    g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`); g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
    x.fillStyle=g; x.beginPath(); x.arc(0,0,rr,0,7); x.fill(); x.restore(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
// 同系色の濃淡を作る（マットと遠目では同色、近くで混色＝ラメ）
function shade(hex,f){ const h=hex.replace('#',''); const v=i=>Math.max(0,Math.min(255,Math.round(parseInt(h.slice(i,i+2),16)*f)));
  return '#'+[v(0),v(2),v(4)].map(x=>x.toString(16).padStart(2,'0')).join(''); }

function quat(x,y,z){ const q=new THREE.Quaternion().setFromEuler(new THREE.Euler(x,y,z)); return {x:q.x,y:q.y,z:q.z,w:q.w}; }

// ===== 配置を再構築（ルールベース） =====
function rebuild(){
  while(group.children.length) group.remove(group.children[0]);
  const beads=resolveBeads();
  const r=mkRng(seed);
  for(let i=beads.length-1;i>0;i--){ const j=Math.floor(r()*(i+1)); [beads[i],beads[j]]=[beads[j],beads[i]]; }
  // Rapier物理（平らにロック＝重ねず、皿いっぱいに密に敷き詰める単層）
  const world=new RAPIER.World(new RAPIER.Vector3(0,-12,0));
  const gb=world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0,-0.5,0));
  world.createCollider(RAPIER.ColliderDesc.cuboid(20,0.5,20).setFriction(0.4), gb);
  // 皿の内側いっぱいに囲い
  const Rw=PLATE_R-0.42;
  const nW=26, seg=Math.PI*2*Rw/nW*0.62;
  for(let i=0;i<nW;i++){ const a=i/nW*Math.PI*2;
    const wb=world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(Math.cos(a)*Rw,1.2,Math.sin(a)*Rw).setRotation(quat(0,-a,0)));
    world.createCollider(RAPIER.ColliderDesc.cuboid(0.12,1.2,seg).setFriction(0.15), wb);
  }
  // 皿いっぱいに重ならず密に敷き詰まるサイズに自動調整（密充填）
  const avgR=beads.length? beads.reduce((a,m)=>a+SHAPES[m.shape].geo.userData.radius,0)/beads.length:1;
  const usable=Math.PI*Math.pow(PLATE_R-0.45,2)*0.92, unit=Math.PI*avgR*avgR;
  const gscale=Math.min(1, Math.sqrt((usable/unit)/Math.max(1,beads.length)));
  const bodies=[], meshes=[];
  beads.forEach((m)=>{
    const g=SHAPES[m.shape].geo, s=gscale*(0.95+r()*0.04);
    const rad=g.userData.radius*s*0.86, hh=g.userData.halfH*s;  // 接点を少し重ねて隙間（皿面）を埋める
    const ang=r()*Math.PI*2, rr=Math.sqrt(r())*(Rw-0.3);      // 皿の縁まで広げて配置
    const bd=RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(Math.cos(ang)*rr, hh+0.03, Math.sin(ang)*rr)
      .setRotation(quat(0, r()*Math.PI*2, 0))
      .setLinearDamping(0.5).lockRotations();                  // 回転固定＝重ねず平ら
    const body=world.createRigidBody(bd);
    world.createCollider(RAPIER.ColliderDesc.cylinder(hh,rad).setFriction(0.2).setRestitution(0.0), body); // 低摩擦＝滑って密に詰まる
    const me=new THREE.Mesh(g,getMat(m.finish,m.color)); me.scale.setScalar(s); me.castShadow=true;
    group.add(me); bodies.push(body); meshes.push(me);
  });
  const steps=240;
  for(let st=0;st<steps;st++) world.step();
  bodies.forEach((b,i)=>{ const t=b.translation(), qq=b.rotation();
    meshes[i].position.set(t.x,t.y,t.z); meshes[i].quaternion.set(qq.x,qq.y,qq.z,qq.w); });
  world.free();
  // 皿を粒のかたまりにフィット（空いた縁を無くす＝皿面が見えない）
  let clusterR=0;
  meshes.forEach((me,i)=>{ const rad=SHAPES[beads[i].shape].geo.userData.radius*me.scale.x;
    const d=Math.hypot(me.position.x,me.position.z)+rad; if(d>clusterR) clusterR=d; });
  const pk=Math.max(0.45,(clusterR+0.35)/PLATE_R); plate.scale.set(pk,1,pk);
}

// ===== 比率ユーティリティ（合計100%按分） =====
function balance(arr,i,v,getR,setR){
  v=Math.max(0,Math.min(100,v));
  const others=arr.map((_,idx)=>idx).filter(idx=>idx!==i);
  const osum=others.reduce((a,idx)=>a+getR(idx),0), rem=100-v;
  if(osum>1e-6) others.forEach(idx=>setR(idx,getR(idx)/osum*rem));
  else if(others.length) others.forEach(idx=>setR(idx,rem/others.length));
  setR(i,v);
}
function setRatio(i,v){ balance(recipe,i,v,k=>recipe[k].ratio,(k,x)=>recipe[k].ratio=x); }
function setCompRatio(p,i,v){ balance(p.comps,i,v,k=>p.comps[k].ratio,(k,x)=>p.comps[k].ratio=x); }
function normalizeRecipe(){ const s=recipe.reduce((a,r)=>a+Math.max(0,r.ratio),0)||1; recipe.forEach(r=>r.ratio=Math.max(0,r.ratio)/s*100); }
function normComps(p){ const s=p.comps.reduce((a,c)=>a+Math.max(0,c.ratio),0)||1; p.comps.forEach(c=>c.ratio=Math.max(0,c.ratio)/s*100); }

// ===== 商品→粒の解決 =====
function recipeCounts(){
  const valid=recipe.map((r,i)=>({r,i})).filter(o=>o.r.ratio>0 && productById(o.r.pid));
  const sum=valid.reduce((a,o)=>a+o.r.ratio,0)||1;
  const counts=recipe.map(()=>0);
  valid.forEach(o=>{ counts[o.i]=Math.max(0,Math.round(o.r.ratio/sum*total)); });
  valid.forEach(o=>{ const p=productById(o.r.pid); if(p.comps.length>1 && counts[o.i]<p.comps.length) counts[o.i]=p.comps.length; });
  return counts;
}
function splitByComps(p,n){
  const cs=p.comps, base=cs.length>1?1:0, sum=cs.reduce((a,c)=>a+Math.max(0,c.ratio),0)||1;
  let arr=cs.map(c=>Math.max(base,Math.round(Math.max(0,c.ratio)/sum*n)));
  let diff=n-arr.reduce((a,b)=>a+b,0), gi=0;
  while(diff!==0 && cs.length){ const i=gi%cs.length; if(diff>0){arr[i]++;diff--;} else if(arr[i]>base){arr[i]--;diff++;} gi++; if(gi>3000)break; }
  return arr;
}
function resolveBeads(){
  const counts=recipeCounts(), beads=[];
  recipe.forEach((r,i)=>{ const p=productById(r.pid); if(!p||counts[i]<=0)return;
    const split=splitByComps(p,counts[i]);
    p.comps.forEach((c,ci)=>{ for(let k=0;k<split[ci];k++) beads.push(c); });
  });
  return beads;
}

const thumbCache={};
function thumbSig(p){ return JSON.stringify(p.comps); }
function makeThumb(p){
  const sig=thumbSig(p); if(thumbCache[sig]) return thumbCache[sig];
  while(thumbGroup.children.length) thumbGroup.remove(thumbGroup.children[0]);
  const N=Math.min(9,Math.max(p.comps.length,6)), split=splitByComps(p,N), list=[];
  p.comps.forEach((c,ci)=>{for(let k=0;k<split[ci];k++)list.push(c);});
  const rr=mkRng(p.id*131+9);
  list.forEach(c=>{ const g=SHAPES[c.shape].geo,s=0.8; const me=new THREE.Mesh(g,getMat(c.finish,c.color)); me.scale.setScalar(s);
    const ang=rr()*Math.PI*2,rad=Math.sqrt(rr())*1.5; me.position.set(Math.cos(ang)*rad,g.userData.halfH*s,Math.sin(ang)*rad); me.rotation.y=rr()*Math.PI*2; thumbGroup.add(me); });
  thumbR.render(thumbScene,thumbCam); const url=thumbR.domElement.toDataURL('image/png'); thumbCache[sig]=url; return url;
}
function invalidateThumb(p){ delete thumbCache[thumbSig(p)]; }

    card.append(img,nm);
    card.onclick=()=>{ const ex=recipe.find(r=>r.pid===p.id);
      if(ex){ if(recipe.length>1){ recipe=recipe.filter(r=>r!==ex); normalizeRecipe(); } }
      else { const w=100/(recipe.length+1); recipe.forEach(r=>r.ratio*=(100-w)/100); recipe.push({pid:p.id,ratio:w}); }
      renderCards(); renderRecipe(); rebuild(); };
    cardGrid.append(card);
  });
}

// ===== 調合：配合 =====
const panel=document.getElementById('mixList');
let rowRefs=[];
function updateValues(){ const counts=recipeCounts(); rowRefs.forEach((ref,i)=>{ ref.rng.value=Math.round(recipe[i].ratio); ref.rv.textContent=Math.round(recipe[i].ratio)+'%'; ref.cnt.textContent=counts[i]+'粒'; }); }
function renderRecipe(){
  panel.innerHTML=''; rowRefs=[];
  recipe.forEach((r,idx)=>{ const p=productById(r.pid); if(!p)return;
    const row=document.createElement('div'); row.className='mix-row';
    const top=document.createElement('div'); top.className='mr-top';
    const nm=document.createElement('span'); nm.className='rprod'; nm.textContent=p.name;
    const del=document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick=()=>{ if(recipe.length<=1)return; recipe.splice(idx,1); normalizeRecipe(); renderCards(); renderRecipe(); rebuild(); };
    top.append(nm,del);
    const rng=document.createElement('input'); rng.type='range'; rng.min=0;rng.max=100;rng.value=Math.round(r.ratio);
    const rv=document.createElement('span'); rv.className='rv'; const cnt=document.createElement('span'); cnt.className='cnt';
    rng.oninput=()=>{ setRatio(idx,+rng.value); updateValues(); };
    rng.onchange=()=>{ setRatio(idx,+rng.value); updateValues(); rebuild(); };
    const bot=document.createElement('div'); bot.className='mr-bot'; bot.append(rng,rv,cnt);
    row.append(top,bot); panel.append(row); rowRefs.push({rng,rv,cnt});
  });
  updateValues();
}

// ===== 商品登録 =====
const regEl=document.getElementById('regList');
function compRow(p,c,ci){
  const wrap=document.createElement('div'); wrap.className='comp';
  const line=document.createElement('div'); line.className='mr-top';
  const ss=shapeSel(c.shape,v=>{ c.shape=v; if(!SHAPES[v].fin.includes(c.finish))c.finish=SHAPES[v].fin[0]; invalidateThumb(p); renderRegistry(); saveProducts(); });
  const fs=finSel(c.shape,c.finish,v=>{ c.finish=v; invalidateThumb(p); renderRegistry(); saveProducts(); });
  const cc=colInput(c.color,v=>{ c.color=v; invalidateThumb(p); renderRegistry(); saveProducts(); });
  const cdel=document.createElement('button'); cdel.className='del'; cdel.textContent='✕';
  cdel.onclick=()=>{ if(p.comps.length<=1)return; p.comps.splice(ci,1); normComps(p); invalidateThumb(p); renderRegistry(); saveProducts(); };
  line.append(ss,fs,cc,cdel);
  const bot=document.createElement('div'); bot.className='mr-bot';
  const rng=document.createElement('input'); rng.type='range'; rng.min=0;rng.max=100;rng.value=Math.round(c.ratio);
  const rv=document.createElement('span'); rv.className='rv'; rv.textContent=Math.round(c.ratio)+'%';
  rng.oninput=()=>{ setCompRatio(p,ci,+rng.value); [...wrap.parentNode.querySelectorAll('.comp')].forEach((el,k)=>{ const rr2=el.querySelector('input[type=range]'),sv=el.querySelector('.rv'); if(p.comps[k]){rr2.value=Math.round(p.comps[k].ratio);sv.textContent=Math.round(p.comps[k].ratio)+'%';} }); };
  rng.onchange=()=>{ setCompRatio(p,ci,+rng.value); invalidateThumb(p); saveProducts(); renderRegistry(); };
  bot.append(rng,rv);
  wrap.append(line,bot); return wrap;
}
function renderRegistry(){
  regEl.innerHTML='';
  products.forEach(p=>{
    const card=document.createElement('div'); card.className='regcard';
    const head=document.createElement('div'); head.className='reg-head';
    const img=document.createElement('img'); img.className='pthumb sm'; img.src=makeThumb(p);
    const nm=document.createElement('input'); nm.className='pname'; nm.value=p.name; nm.oninput=()=>{p.name=nm.value;}; nm.onchange=()=>saveProducts();
    const del=document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick=()=>{ products=products.filter(x=>x!==p); recipe=recipe.filter(r=>r.pid!==p.id); if(!recipe.length&&products.length)recipe=[{pid:products[0].id,ratio:100}]; normalizeRecipe(); saveProducts(); renderRegistry(); };
    head.append(img,nm,del); card.append(head);
    p.comps.forEach((c,ci)=>card.append(compRow(p,c,ci)));
    const addc=document.createElement('button'); addc.className='act ghost mini'; addc.textContent='＋素材';
    addc.onclick=()=>{ p.comps.push({shape:'octa',finish:'matte',color:'#8FCFC4',ratio:20}); normComps(p); invalidateThumb(p); renderRegistry(); saveProducts(); };
    card.append(addc); regEl.append(card);
  });
}
document.getElementById('addProd').onclick=()=>{ products.push({id:pidSeq++,name:'新規商品',comps:[{shape:'octa',finish:'matte',color:'#3C8C82',ratio:100}]}); saveProducts(); renderRegistry(); };

// ===== ハンドラ =====
document.getElementById('shuffleBtn').onclick=()=>{ seed=(seed*16807+1)&0x7fffffff; rebuild(); };
const totalRange=document.getElementById('totalRange'), totalVal=document.getElementById('totalVal');
totalRange.oninput=()=>{ total=+totalRange.value; totalVal.textContent=total; updateValues(); };
totalRange.onchange=()=>{ total=+totalRange.value; totalVal.textContent=total; updateValues(); rebuild(); };
document.getElementById('saveBtn').onclick=()=>{ renderer.render(scene,camera); const a=document.createElement('a'); a.download='wax-mix.png'; a.href=renderer.domElement.toDataURL('image/png'); a.click(); };
showTab('sim');

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
function loop(){controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
loop();
</script>
