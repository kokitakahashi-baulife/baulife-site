<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOMU コラボ資料ジェネレーター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap">
<link rel="stylesheet" href="/tools/baulife-brand.css">
<style>
  :root{
    --ink:var(--bl-ink); --gray:var(--bl-muted); --cream:var(--bl-bg); --paper:var(--bl-surface);
    --red:var(--bl-brand); --line:var(--bl-line); --tint:var(--bl-brand-tint); --secret:var(--bl-surface-2);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--bl-font-ja);color:var(--ink);background:var(--cream);}
  .btn,.act{transition:background .15s,border-color .15s,color .15s,transform .12s;}
  .btn:active,.act:active{transform:translateY(1px) scale(.99);}
  .toolbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .toolbar h1{font-size:15px;margin:0 12px 0 0;color:var(--red);font-weight:700;}
  .toolbar .spacer{flex:1;}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{border:0;background:transparent;padding:7px 12px;font-size:12.5px;cursor:pointer;color:var(--gray);white-space:nowrap;}
  .seg button.active{background:var(--red);color:#fff;}
  .btn{border:1px solid var(--line);background:var(--paper);border-radius:8px;padding:7px 13px;
    font-size:13px;cursor:pointer;color:var(--ink);}
  .btn:hover{background:var(--cream);}
  .btn.primary{background:var(--red);color:#fff;border-color:var(--red);}
  .app{display:flex;height:calc(100vh - 53px);}
  .pane-form{width:44%;min-width:380px;overflow-y:auto;padding:18px 20px 80px;border-right:1px solid var(--line);}
  .pane-preview{flex:1;overflow-y:auto;background:#ece6db;padding:24px;display:flex;justify-content:center;}
  fieldset{border:1px solid var(--line);border-radius:10px;margin:0 0 16px;padding:12px 14px;background:var(--paper);}
  legend{font-size:13px;font-weight:700;color:var(--red);padding:0 6px;}
  label.fl{display:block;font-size:12px;color:var(--gray);margin:10px 0 3px;}
  input[type=text],input[type=number],input[type=date],textarea,select{width:100%;border:1px solid var(--line);border-radius:7px;
    padding:7px 9px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;}
  textarea{resize:vertical;min-height:52px;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  .chk{display:flex;align-items:center;gap:7px;font-size:13px;margin:6px 0;}
  .note{background:#f3efe7;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--ink);line-height:1.7;margin-bottom:10px;}
  .note b{color:var(--red);}
  .hint{font-size:11px;color:var(--gray);margin:2px 0 0;}
  .own{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;padding:1px 7px;margin-left:6px;vertical-align:middle;white-space:nowrap;}
  .own.homu{background:#f6d9df;color:var(--red);}
  .own.hear{background:#e3efdd;color:#4a7a3a;}
  .own.both{background:#e9e2f3;color:#6a4a9a;}
  .imgslot{margin-top:6px;border:1.5px dashed var(--line);border-radius:8px;background:#fff;
    min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;font-size:12px;color:var(--gray);position:relative;overflow:hidden;padding:6px;}
  .imgslot.drag{border-color:var(--red);background:var(--tint);}
  .imgslot img{max-width:100%;max-height:110px;border-radius:4px;}
  .imgslot.k-portrait{aspect-ratio:100/148;max-width:150px;min-height:0;padding:0;margin-left:auto;margin-right:auto;}
  .imgslot.k-square{aspect-ratio:1/1;max-width:150px;min-height:0;padding:0;}
  .imgslot.k-portrait img,.imgslot.k-square img{max-height:none;width:100%;height:100%;object-fit:contain;border-radius:0;}
  .imgslot .pdfchip{font-size:12px;color:var(--red);font-weight:700;}
  .imgslot .rm{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.9);border:1px solid var(--line);
    border-radius:5px;font-size:11px;padding:1px 6px;cursor:pointer;color:var(--red);z-index:2;}
  .item-form{border-left:3px solid var(--red);padding-left:10px;margin:14px 0;}
  .item-form.secret{border-left-color:#b98a3c;}
  .item-form .ihead{font-size:12.5px;font-weight:700;color:var(--red);margin:2px 0 4px;}
  .recipe-btn{margin-top:6px;width:100%;border:1px solid var(--line);background:var(--paper);border-radius:7px;
    padding:6px;font-size:12px;cursor:pointer;color:var(--red);}
  .recipe-btn:hover{background:var(--tint);}
  .imgcollapse{margin-top:6px;}
  .imgcollapse>summary{font-size:11px;color:var(--gray);cursor:pointer;list-style:none;}
  .imgcollapse>summary::-webkit-details-marker{display:none;}
  .rp-overlay{position:fixed;inset:0;background:rgba(40,34,28,.5);z-index:100;display:flex;
    align-items:center;justify-content:center;padding:24px;}
  .rp-modal{background:var(--paper);border-radius:14px;max-width:760px;width:100%;max-height:86vh;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3);}
  .rp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);}
  .rp-head h3{margin:0;font-size:15px;color:var(--red);}
  .rp-head .x{border:0;background:none;font-size:20px;cursor:pointer;color:var(--gray);line-height:1;}
  .rp-body{overflow-y:auto;padding:14px 18px;}
  .rp-search{width:100%;margin-bottom:12px;}
  .rp-rec{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-bottom:10px;background:#fff;}
  .rp-rec .rp-name{font-size:13px;font-weight:700;flex:1;min-width:0;}
  .rp-rec .rp-name small{display:block;font-weight:400;color:var(--gray);font-size:11px;margin-top:3px;line-height:1.4;}
  .rp-imgs{display:flex;gap:10px;flex:0 0 auto;}
  .rp-pick{cursor:pointer;text-align:center;border:2px solid transparent;border-radius:8px;padding:3px;background:#f3efe8;}
  .rp-pick:hover{border-color:var(--red);}
  .rp-pick img{display:block;width:72px;height:72px;object-fit:cover;border-radius:5px;}
  .rp-pick span{display:block;font-size:10px;color:var(--gray);margin-top:2px;}
  .rp-empty{color:var(--gray);font-size:13px;text-align:center;padding:30px 0;}

  /* ---------- preview sheet (A4) ---------- */
  .sheet{width:210mm;min-height:297mm;background:#fff;padding:16mm 15mm;box-shadow:0 2px 14px rgba(0,0,0,.15);
    color:var(--ink);font-size:11pt;line-height:1.7;}
  .sheet .kicker{font-size:9pt;letter-spacing:2px;color:var(--red);}
  .sheet h2.tt{font-size:23pt;font-weight:700;margin:2px 0 4px;}
  .sheet .sub{font-size:10pt;color:var(--gray);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:14px;}
  .sheet h3{font-size:13.5pt;color:var(--red);border-bottom:2px solid var(--red);padding-bottom:4px;margin:20px 0 10px;}
  .sheet h3 .own{font-size:8.5pt;}
  .sheet h4{font-size:11pt;margin:10px 0 5px;}
  .sheet p{margin:0 0 8px;}
  .sheet .muted{color:var(--gray);font-size:9.5pt;}
  .sheet ul,.sheet ol{margin:4px 0 10px;padding-left:1.3em;}
  .sheet li{margin:0 0 4px;}
  .sheet .qa{margin:0 0 9px;}
  .sheet .qa .q{font-weight:700;}
  .sheet .qa .q .own{font-size:8pt;}
  .sheet .qa .a{white-space:pre-wrap;}
  .sheet .qa .a.empty{color:#bdb3a4;font-style:italic;}
  .sheet .advice{background:#f7f2ea;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:8px 0 12px;}
  .sheet .advice ul{margin:0;}
  .sheet .boxdef{background:var(--tint);border-radius:8px;padding:9px 12px;font-size:10pt;margin:6px 0 10px;}
  .sheet .hero{background:var(--tint);border:1.5px solid var(--red);border-radius:10px;padding:12px 16px;margin:6px 0 12px;font-size:14pt;font-weight:700;color:var(--ink);line-height:1.5;}
  .sheet .hero b{color:var(--red);font-size:17pt;}
  .sheet .hero .heros{font-size:10.5pt;font-weight:500;color:var(--gray);}
  .sheet table.spec{width:100%;border-collapse:collapse;font-size:9.5pt;margin:6px 0 12px;}
  .sheet table.spec th,.sheet table.spec td{border:1px solid var(--line);padding:5px 7px;text-align:left;vertical-align:top;}
  .sheet table.spec th{background:var(--red);color:#fff;font-weight:600;font-size:9pt;white-space:nowrap;}
  .sheet table.spec td.c{text-align:center;white-space:nowrap;}
  .sheet table.role{width:100%;border-collapse:collapse;font-size:10pt;margin:6px 0 12px;}
  .sheet table.role th,.sheet table.role td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top;}
  .sheet table.role th{background:#f0ebe2;width:26%;font-weight:600;}
  .pv-img{width:100%;height:100%;object-fit:contain;cursor:zoom-in;}
  .pv-box{border:1px dashed var(--line);border-radius:6px;background:var(--cream);color:#bdb3a4;
    display:flex;align-items:center;justify-content:center;font-size:9pt;text-align:center;padding:6px;width:100%;height:100%;}
  .pv-cap{font-size:9pt;color:var(--gray);text-align:center;margin-top:4px;}
  .media{margin:6px 0 10px;}
  .media.portrait{width:46mm;} .media.portrait .mbox{aspect-ratio:100/148;}
  .media.square{width:40mm;} .media.square .mbox{aspect-ratio:1/1;}
  .media.wide{width:60mm;} .media.wide .mbox{height:100px;}
  .media.box{width:100mm;} .media.box .mbox{aspect-ratio:4/3;}
  .media .mbox{width:100%;border-radius:6px;overflow:hidden;}
  .media.pdf .mbox{display:flex;align-items:center;justify-content:center;border:1px dashed var(--line);background:var(--cream);color:var(--red);font-size:9pt;font-weight:700;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .wax-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 12px;margin-top:10px;}
  .wax-chip{display:inline-flex;flex-direction:column;align-items:center;gap:1px;font-size:9.5pt;color:var(--ink);}
  .wax-chip b{font-weight:700;font-size:9.5pt;}
  .wax-chip .wsil{display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15));}
  @media print{ .pv-img{cursor:default;} }
  .lb-overlay{position:fixed;inset:0;background:rgba(20,16,12,.82);z-index:200;display:flex;
    align-items:center;justify-content:center;padding:30px;cursor:zoom-out;}
  .lb-overlay img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);background:#fff;}
  .pcard{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:12px 0;background:#fdfbf7;break-inside:avoid;}
  .pcard.secret{background:var(--secret);}
  .pcard .ph{font-size:12pt;font-weight:700;color:var(--red);margin-bottom:8px;}
  .pcard .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:9.5pt;color:var(--gray);margin-bottom:6px;}
  .pcard .meta b{color:var(--ink);}
  .sched{display:flex;justify-content:space-between;border-bottom:1px dotted var(--line);padding:5px 0;font-size:10.5pt;}
  .price-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0;}
  .price-card{border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;}
  .price-card .nm{font-weight:700;}
  .price-card .pr{font-size:15pt;color:var(--red);margin-top:4px;}
  .price-card .dsc{font-size:9pt;color:var(--gray);}

  /* ---------- list ---------- */
  #listScreen{max-width:1040px;margin:0 auto;padding:40px 24px 80px;}
  .portal-back{display:inline-block;font-size:13px;color:var(--gray);text-decoration:none;margin:0 0 18px;}
  .portal-back:hover{color:var(--red);}
  .list-head h1{font-size:20px;color:var(--red);margin:0 0 6px;font-weight:700;}
  .list-head p{font-size:13px;color:var(--gray);margin:0 0 24px;}
  .list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .card{position:relative;border:1px solid var(--line);border-radius:12px;background:var(--paper);padding:16px;
    cursor:pointer;min-height:118px;display:flex;flex-direction:column;gap:6px;transition:border-color .15s;}
  .card:hover{border-color:var(--red);}
  .card-del{position:absolute;top:8px;right:8px;border:0;background:transparent;color:#c4b8a6;
    font-size:11px;cursor:pointer;padding:3px 6px;border-radius:6px;line-height:1;}
  .card-del:hover{background:#fbe3dd;color:var(--red);}
  .card .c-name{font-size:15px;font-weight:700;color:var(--ink);}
  .card .c-theme{font-size:12px;color:var(--gray);flex:1;overflow:hidden;}
  .card .c-meta{font-size:11px;color:#b3a895;border-top:1px solid var(--line);padding-top:8px;}
  .card.new{align-items:center;justify-content:center;color:var(--red);font-weight:700;
    border-style:dashed;font-size:15px;background:transparent;}
  .save-status{font-size:12px;color:var(--gray);margin-left:6px;white-space:nowrap;}
  .fname-input{border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:13px;
    font-family:inherit;color:var(--ink);background:#fff;width:200px;max-width:30vw;}
  #conflictBar{display:none;align-items:center;gap:10px;padding:8px 16px;background:#fbe3dd;
    border-bottom:1px solid var(--line);font-size:13px;color:var(--red);flex-wrap:wrap;}
  #conflictBar .msg{flex:1;min-width:200px;}
  #saveErrorBar{display:none;align-items:center;gap:10px;padding:8px 16px;background:#fdeccd;
    border-bottom:1px solid #e6c886;font-size:13px;color:#8a5a00;flex-wrap:wrap;}
  #saveErrorBar .msg{flex:1;min-width:220px;}

  @media print{
    @page{size:A4;margin:0;}
    #listScreen,#conflictBar,#saveErrorBar{display:none !important;}
    .toolbar,.pane-form{display:none !important;}
    .app{display:block;height:auto;}
    .pane-preview{display:block;padding:0;background:#fff;overflow:visible;}
    .sheet{box-shadow:none;width:auto;min-height:auto;}
    .doc{display:none;}
    .doc.printing{display:block;}
    #scaler{zoom:1 !important;width:auto !important;}
  }
</style>
</head>
<body>
<div id="listScreen">
  <div class="list-head">
    <a class="portal-back" href="/tools">← 社内ポータル</a>
    <h1>HOMU コラボ資料ジェネレーター</h1>
    <p>1件を埋めれば「提案資料（定型）」と「設計シート（書き下ろし依頼）」をまとめて出力できます。共有ドライブに自動保存されます。</p>
  </div>
  <div id="listGrid" class="list-grid"></div>
</div>

<div id="editScreen" style="display:none">
  <div class="toolbar">
    <button class="btn" onclick="backToList()">← 一覧</button>
    <div class="seg" id="seg">
      <button data-doc="a" class="active">提案資料</button>
      <button data-doc="b">設計シート</button>
    </div>
    <input id="fileNameInput" class="fname-input" placeholder="ファイル名（空欄なら自動）" title="共有ドライブ上のファイル名">
    <span id="saveStatus" class="save-status"></span>
    <div class="spacer"></div>
    <button class="btn" onclick="deleteCurrent()">削除</button>
    <button class="btn" onclick="saveFile()">バックアップDL(.json)</button>
    <button class="btn primary" onclick="exportPDF()">この資料をPDF出力</button>
  </div>

  <div id="conflictBar">
    <span class="msg"></span>
    <button class="btn" onclick="conflictReload()">最新を読み込む</button>
    <button class="btn primary" onclick="conflictOverwrite()">自分の変更で上書き</button>
  </div>

  <div id="saveErrorBar">
    <span class="msg"></span>
    <button class="btn" onclick="saveFile()">バックアップをダウンロード</button>
    <button class="btn primary" onclick="reloginTab()">別タブで再ログイン</button>
  </div>

  <div class="app">
    <div class="pane-form" id="form"></div>
    <div class="pane-preview">
      <div id="scaler" style="width:210mm">
        <div class="doc" id="doc-a"><div class="sheet" id="pv-a"></div></div>
        <div class="doc" id="doc-b" style="display:none"><div class="sheet" id="pv-b"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ========== 定数・データモデル ========== */
const SCHED = [
  {label:"ライセンス契約の締結",      interval:0},
  {label:"設計シートの合意",          interval:3},
  {label:"書き下ろし・素材の受領",     interval:14},
  {label:"スタンプヘッド試作の確認",   interval:11},
  {label:"予約販売の告知",           interval:10},
  {label:"予約販売開始",             interval:14},
  {label:"生産開始",                interval:1},
  {label:"配送開始",                interval:21},
];
const CIRCLED=["①","②","③","④","⑤","⑥"];
const DIMS=["","2D","3D"];
const SHAPES=["","丸型","四角型","シルエット型"];
const ROLE_OPTIONS=["","世界観の顔","3D彫りの立体","セパレート／色分け映え","入門・量産","その他"];
// HOMU → クリエイターへ渡す「売れるデザインの勝ち筋」（設計シートに常時掲載）
const DESIGN_ADVICE=[
  "スタンプヘッドの外形は、円や四角より“その作品だけの独自シルエット”が強い（一目でその作品と分かり、拡散・指名買いにつながります）。",
  "細かなモチーフを散りばめると、色を塗り分けて押す動画が映えて拡散されやすいです。色分けできる構図だと◎。",
  "立体（3D彫り）に向くのは、モチーフの重なりが少なく高低差を出せる構図。平面（2D）は線画や複数キャラの並びが得意です。",
  "全部を同じ雰囲気にせず“役割”で差をつけると、全種そろえたくなります（世界観の顔／立体で魅せる／色分けで映える／初心者向けの入門）。",
];
const LICENSE_RATE="10"; // ライセンス料は固定10%（税抜）
const PRESENT_NOTE="一部のスタンプヘッド等を、フォロワーへのプレゼント企画で配布します。";
const DEFAULT_BOX_IMG="/tools/concept-box-default.webp"; // コンセプトボックスの既定イメージ（提案資料）

function blankItem(){return {
  ttl:"", role:"", dim:"", shape:"シルエット型", motif:"",
  illust:"", brief:"", price:"", qty:"",
  waxText:"", wax:"", waxColors:null,
  genga:"", stamp:"", postcard:""
};}
function defaultData(){
  return {
    fileName:"", creator:"", ip:"",
    contractDate:"",
    theme:"", themeImg:"", boxImg:DEFAULT_BOX_IMG,
    itemCount:4,
    secretEnabled:true,
    sales:{complete:true, single:true},
    prices:{complete:"", single:""},
    postcardIncluded:true,
    postcardNote:"各コンセプトボックスに、対になるポストカード（背景台紙）を1枚ずつ入れます。",
    overall:{core:"", fans:"", ng:""},
    schedule:SCHED.map(s=>({label:s.label, interval:s.interval})),
    items:[blankItem(),blankItem(),blankItem(),blankItem(),blankItem(),blankItem()],
    secret:blankItem()
  };
}
function addDays(isoDate, days){
  if(!isoDate) return "";
  const d=new Date(isoDate+"T00:00:00");
  if(isNaN(d.getTime())) return "";
  d.setDate(d.getDate()+(parseInt(days,10)||0));
  return d.getFullYear()+"/"+("0"+(d.getMonth()+1)).slice(-2)+"/"+("0"+d.getDate()).slice(-2);
}
function secretCount(){ return data.secretEnabled?1:0; }
let data = defaultData();

/* ========== 共有ドライブ保存（配線：既存を踏襲） ========== */
let currentId=null, baseModified=null;
let saveTimer=null, saving=false, dirtyAgain=false;
let pendingDirty=false, conflictActive=false, saveFailCount=0, scheduleOpen=false;
function setStatus(t){ const e=document.getElementById("saveStatus"); if(e) e.textContent=t; }
function hhmm(d){ return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
function metaOf(){ return { creator:(data.creator||""), theme:((data.theme)||"").replace(/\s+/g," ").trim().slice(0,40) }; }
function fileBase(){
  const fn=(data.fileName||"").trim();
  if(fn) return fn;
  return ((data.creator&&data.creator.trim())||"無題")+"_コラボ資料";
}
function setUrl(id){ try{ history.replaceState(null,"",location.pathname+"?id="+encodeURIComponent(id)); }catch(e){} }
function clearUrl(){ try{ history.replaceState(null,"",location.pathname); }catch(e){} }

function autosave(){
  if(!currentId || conflictActive) return;
  pendingDirty=true; setStatus("保存中…");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){ saveNow(false); },1200);
}
async function saveNow(force){
  if(!currentId) return;
  if(saving){ dirtyAgain=true; return; }
  saving=true;
  try{
    if(!force && baseModified){
      try{
        const mr=await fetch("/api/tools/projects/"+currentId+"?meta=1");
        if(mr.ok){
          const mj=await mr.json();
          const remoteMod=mj.meta&&mj.meta.modifiedTime;
          if(remoteMod && remoteMod!==baseModified){ showConflict(mj.meta); return; }
        }
      }catch(e){}
    }
    const res=await fetch("/api/tools/projects/"+currentId,{method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:fileBase(),content:data,meta:metaOf()})});
    if(!res.ok){ const t=await res.text(); const err=new Error(t||("HTTP "+res.status)); err.status=res.status; throw err; }
    const rj=await res.json().catch(function(){return null;});
    if(rj&&rj.modifiedTime) baseModified=rj.modifiedTime;
    pendingDirty=false; saveFailCount=0; hideSaveError();
    setStatus("保存しました "+hhmm(new Date()));
  }catch(e){
    console.error(e); saveFailCount++;
    if(e&&e.status===401){ setStatus("⚠ ログインが切れた可能性"); showSaveError(true); }
    else if(saveFailCount>=3){ setStatus("⚠ 保存に繰り返し失敗"); showSaveError(false); }
    else { setStatus("⚠ 保存に失敗。再試行します…"); }
    setTimeout(function(){ saveNow(force); },4000);
  }finally{
    saving=false;
    if(dirtyAgain && !conflictActive){ dirtyAgain=false; autosave(); }
  }
}
function saveFile(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fileBase()+".json"; a.click();
}

function normalize(){
  if(!Array.isArray(data.items)) data.items=[];
  while(data.items.length<6) data.items.push(blankItem());
  data.items=data.items.map(it=>Object.assign(blankItem(),it||{}));
  data.secret=Object.assign(blankItem(),data.secret||{});
  data.overall=Object.assign({core:"",fans:"",ng:""},data.overall||{});
  data.sales=Object.assign({complete:true,single:true},data.sales||{});
  data.prices=Object.assign({complete:"",single:""},data.prices||{});
  if(!Array.isArray(data.schedule)||!data.schedule.length) data.schedule=SCHED.map(s=>({label:s.label,interval:s.interval}));
  data.itemCount=Math.min(6,Math.max(1,parseInt(data.itemCount,10)||1));

async function openProject(id, modifiedTime){

    const j=await res.json();

    if(modifiedTime){ baseModified=modifiedTime; }
    else { baseModified=null; try{ const mr=await fetch("/api/tools/projects/"+id+"?meta=1"); if(mr.ok){ const mj=await mr.json(); baseModified=mj.meta&&mj.meta.modifiedTime; } }catch(e){} }

function isPdf(v){ return typeof v==="string" && v.indexOf("data:application/pdf")===0; }
function pickFile(cb, accept){
  const i=document.createElement("input"); i.type="file"; i.accept=accept||"image/*";
  i.onchange=()=>{ const f=i.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>cb(r.result,f.name); r.readAsDataURL(f); };
  i.click();
}
// kind: "free"(既定) / "portrait"(ポストカード等・縦) / "square"(スタンプ等)
function imgSlot(label, getVal, setVal, kind, allowPdf){
  const wrap=document.createElement("div"); wrap.className="imgslot"+(kind==="portrait"?" k-portrait":kind==="square"?" k-square":"");
  const accept = allowPdf ? "image/*,application/pdf" : "image/*";
  function paint(){
    const v=getVal(); wrap.innerHTML="";
    if(v){
      if(isPdf(v)){ wrap.appendChild(el("div","pdfchip","📄 PDF 添付済み")); }
      else { const im=document.createElement("img"); im.src=v; wrap.appendChild(im); }
      const rm=document.createElement("button"); rm.className="rm"; rm.textContent="削除";
      rm.onclick=ev=>{ev.stopPropagation(); setVal(""); paint(); render(); autosave();}; wrap.appendChild(rm);
    } else { wrap.textContent=label+"（クリック / D&D）"; }
  }
  wrap.onclick=()=>pickFile((d)=>{setVal(d);paint();render();autosave();}, accept);
  wrap.addEventListener("dragover",e=>{e.preventDefault();wrap.classList.add("drag");});
  wrap.addEventListener("dragleave",()=>wrap.classList.remove("drag"));
  wrap.addEventListener("drop",e=>{e.preventDefault();wrap.classList.remove("drag");
    const f=e.dataTransfer.files[0]; if(f&&(f.type.startsWith("image")||(allowPdf&&f.type==="application/pdf"))){const r=new FileReader();
      r.onload=()=>{setVal(r.result);paint();render();autosave();};r.readAsDataURL(f);}});
  paint(); return wrap;
}

/* ========== プレビュー描画 ========== */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ans(v){ return v? `<span class="a">${esc(v)}</span>` : `<span class="a empty">（未記入）</span>`; }
function ipx(){ return data.ip?("（IP："+esc(data.ip)+"）"):""; }
function secLabel(){ return data.secretEnabled?("＋シークレット"+secretCount()+"種"):""; }
function pvMedia(v,cap,kind){
  const cls = kind==="portrait"?"portrait":kind==="square"?"square":kind==="box"?"box":"wide";
  if(isPdf(v)) return `<div class="media ${cls} pdf"><div class="mbox">📄 PDF</div><div class="pv-cap">${cap}</div></div>`;
  const inner = v ? `<img class="pv-img" src="${v}">` : `<div class="pv-box">${cap}</div>`;
  return `<div class="media ${cls}"><div class="mbox">${inner}</div><div class="pv-cap">${cap}</div></div>`;
}

function renderSalesDef(){

  if(data.sales.single)   modes.push({nm:"単品販売", dsc:(sc?"通常"+total+"種から1種ずつ購入（シークレットは含みません）":"1種から購入できる"), pr:data.prices.single});
  const cards=modes.length
    ? '<div class="price-cards">'+modes.map(function(m){ return '<div class="price-card"><div class="nm">'+esc(m.nm)+'</div><div class="dsc">'+m.dsc+'</div>'+(m.pr?'<div class="pr">¥'+esc(m.pr)+'</div>':'')+'</div>'; }).join('')+'</div>'
    : '<p class="muted">（販売方法を選択してください）</p>';
  return cards+'<p class="muted">※ '+esc(PRESENT_NOTE)+'</p>';
}
function scheduleHtml(){
  let cum=0;
  return data.schedule.map(function(s,i){ cum+=parseInt(s.interval,10)||0; const note=i===0?"（基準日）":("（前工程＋"+s.interval+"日）"); return '<div class="sched"><span>'+esc(s.label)+note+'</span><span class="muted">'+(esc(addDays(data.contractDate,cum))||"____/__/__")+'</span></div>'; }).join("");
}

    <div class="boxdef">1コンセプトボックス＝スタンプヘッド・ワックス・ポストカードが1点ずつの1セット。下記の <b>${total}種${secLabel()}</b> をつくります。各お題は「方向性」です。詳細は ${esc(data.creator)||"クリエイター"}様の自由に描いていただいてOKです（変更・アレンジ歓迎）。</div>
    ${items}

    ${data.postcardIncluded?('<h3>5. ポストカード</h3><p class="muted">'+esc(data.postcardNote)+'</p>'):""}

    <p class="muted" style="border-top:1px solid var(--line);padding-top:8px;margin-top:14px">※ 本シートは相談のたたき台です。一緒に埋めながら確定します。</p>
  `;
}

function render(){ renderA(); renderB(); }

function fitPreview(){
  const pane=document.querySelector(".pane-preview");
  const avail=pane.clientWidth-48;
  const sheetPx=794;
  document.getElementById("scaler").style.zoom=Math.min(1, Math.max(0.3, avail/sheetPx));
}
window.addEventListener("resize",fitPreview);

initApp();
</script>
</body>
